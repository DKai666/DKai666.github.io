<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分帳</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .app {
      max-width: 480px;
      margin: auto;
      padding: 16px;
      padding-bottom: 90px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card.done {
      opacity: .4;
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-light {
      background: #fff;
      border: 1px solid #ccc;
      color: #222;
    }

    .btn-danger {
      background: #fff;
      border: 1px solid #ff4d6d;
      color: #ff4d6d;
    }

    .field {
      margin-bottom: 12px;
    }

    input,
    select {
      width: 100%;
      height: 44px;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 0 10px;
      font-size: 16px;
      background: #fff;
    }

    input:disabled {
      background: #f0f0f0;
      color: #555;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tag {
      background: #eee;
      padding: 6px 10px;
      border-radius: 999px;
      margin-right: 6px;
      margin-top: 8px;
      display: inline-block;
    }

    .tag span {
      color: #888;
      margin-left: 6px;
      cursor: pointer;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 90px 62px 42px;
      gap: 8px;
      align-items: center;
    }

    .split.paid {
      opacity: .4;
    }

    .amount-input {
      width: 90px;
      text-align: right;
    }

    .hint {
      color: #ff4d6d;
      font-size: 13px;
      margin-top: 4px;
    }

    .bottom {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #fff;
      padding: 12px 16px;
      box-shadow: 0 -2px 10px rgba(0,0,0,.08);
      font-weight: 700;
    }

    .muted {
      color: #777;
      font-size: 14px;
    }

    h2 {
      margin: 0 0 12px;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- ================= LIST PAGE ================= -->
    <div id="listPage">
      <div class="header-row">
        <h2>分帳</h2>
        <button class="btn btn-primary" onclick="goCreate()">＋新增</button>
      </div>

      <div id="list"></div>
    </div>

    <!-- ================= CREATE PAGE ================= -->
    <div id="createPage" style="display:none;">
      <div class="header-row">
        <h2>新增</h2>
        <button class="btn btn-light" onclick="showList()">返回</button>
      </div>

      <div class="card">
        <div class="field">
          <label>標題</label>
          <input id="titleInput" placeholder="ex：電影">
        </div>

        <div class="field">
          <label>總金額</label>
          <input id="totalInput" type="number" placeholder="ex：666">
        </div>

        <div class="field">
          <label>建立人</label>
          <select id="creatorSelect" onchange="handleCreatorChange()"></select>
        </div>

        <div class="field">
          <label>收款帳號</label>
          <input id="accountDisplay" disabled>
        </div>

        <div class="field">
          <label>分帳人</label>

          <div class="row">
            <select id="memberSelect" onchange="handleMemberSelect()"></select>
            <button class="btn btn-primary" type="button" onclick="addMember()">＋</button>
          </div>

          <div id="customNameBox" style="display:none;margin-top:8px;">
            <input id="customNameInput" placeholder="輸入名字">
          </div>

          <div id="membersBox"></div>
        </div>

        <div class="hint" id="createErr"></div>

        <button class="btn btn-primary" onclick="createBill()">建立</button>
      </div>
    </div>

    <!-- ================= DETAIL PAGE ================= -->
    <div id="detailPage" style="display:none;">
      <div class="header-row">
        <h2 id="detailTitle"></h2>
        <button class="btn btn-danger" onclick="deleteCurrentBill()">刪除整單</button>
      </div>

      <button class="btn btn-light" onclick="showList()">返回</button>

      <div class="card" style="margin-top:12px;">
        總金額：<b id="detailTotal"></b>
        <div id="diffText" class="hint"></div>
      </div>

      <div class="card">
        建立人：<b id="detailCreator"></b><br>
        <span id="detailTime" class="muted"></span><br>
        帳號：<b id="detailAccount"></b>
        <button class="btn btn-light" onclick="copyAccount()">複製</button>
      </div>

      <div id="splitsBox"></div>
    </div>

  </div>

  <!-- ================= BOTTOM BAR ================= -->
  <div class="bottom" id="bottomBar" style="display:none;">
    未收：<span id="unpaidAmount">0</span>
  </div>

  <script>
    /* ================= DATA ================= */

    const USERS = [
      { name: '阿凱', bank: '台新銀行', account: '28881012586282' },
      { name: '小美', bank: 'LINE Pay', account: 'amy123' },
      { name: '婷婷', bank: '玉山銀行', account: '99887766' },
      { name: '自訂' }
    ];

    let DB = [];
    let current = null;
    let members = [];

    /* ================= INIT ================= */

    init();

    function init() {
      USERS.forEach((u, i) => {
        creatorSelect.add(new Option(u.name, i));
      });

      updateAccountDisplay();
      renderCreateMemberSelect();
      showList();
    }

    /* ================= PAGE ================= */

    function showList() {
      listPage.style.display = 'block';
      createPage.style.display = 'none';
      detailPage.style.display = 'none';
      bottomBar.style.display = 'none';

      renderBillList();
    }

    function goCreate() {
      members = [];

      titleInput.value = '';
      totalInput.value = '';
      createErr.innerText = '';
      customNameInput.value = '';
      customNameBox.style.display = 'none';

      renderMembers();
      renderCreateMemberSelect();

      listPage.style.display = 'none';
      createPage.style.display = 'block';
      detailPage.style.display = 'none';
      bottomBar.style.display = 'none';
    }

    function openBill(id) {
      current = DB.find(x => x.id === id);
      if (!current) return;

      detailTitle.innerText = current.title;
      detailTotal.innerText = '$' + current.total;
      detailCreator.innerText = current.createdBy;
      detailTime.innerText = new Date(current.createdAt).toLocaleDateString('zh-TW');
      detailAccount.innerText = current.bank + ' ' + current.account;

      renderSplits();

      listPage.style.display = 'none';
      createPage.style.display = 'none';
      detailPage.style.display = 'block';
      bottomBar.style.display = 'block';
    }

    /* ================= LIST ================= */

    function renderBillList() {
      list.innerHTML = '';

      if (DB.length === 0) {
        list.innerHTML = '<div class="card muted"></div>';
        return;
      }

      DB.forEach(b => {
        const allPaid = b.splits.length > 0 && b.splits.every(s => s.paid);

        const div = document.createElement('div');
        div.className = 'card' + (allPaid ? ' done' : '');
        div.innerHTML = `
          <div style="font-weight:700">${escapeHtml(b.title)}</div>
          <div>$${b.total}</div>
          <div class="muted">建立人：${escapeHtml(b.createdBy)}</div>
        `;
        div.onclick = () => openBill(b.id);

        list.appendChild(div);
      });
    }

    /* ================= CREATE - CREATOR ================= */

    function handleCreatorChange() {
      updateAccountDisplay();

      const creatorName = USERS[creatorSelect.value].name;
      members = members.filter(m => m !== creatorName);

      renderMembers();
      renderCreateMemberSelect();
    }

    function updateAccountDisplay() {
      const u = USERS[creatorSelect.value];
      accountDisplay.value = u.bank ? u.bank + ' ' + u.account : '';
    }

    /* ================= CREATE - MEMBER SELECT ================= */

    function renderCreateMemberSelect() {
      memberSelect.innerHTML = '';

      USERS.forEach((u, i) => {
        if (u.name === USERS[creatorSelect.value].name) return;
        if (members.includes(u.name) && u.name !== '自訂') return;

        const opt = new Option(u.name, i);
        opt.dataset.index = i;
        memberSelect.add(opt);
      });

      handleMemberSelect();
    }

    function handleMemberSelect() {
      const opt = memberSelect.options[memberSelect.selectedIndex];
      if (!opt) {
        customNameBox.style.display = 'none';
        return;
      }

      const idx = opt.dataset.index;

      if (USERS[idx].name === '自訂') {
        customNameBox.style.display = 'block';
      } else {
        customNameBox.style.display = 'none';
      }
    }

    function addMember() {
      const opt = memberSelect.options[memberSelect.selectedIndex];
      if (!opt) return;

      const idx = opt.dataset.index;
      const u = USERS[idx];

      let name = u.name;

      if (name === '自訂') {
        name = customNameInput.value.trim();
        if (!name) return;
        customNameInput.value = '';
      }

      const creatorName = USERS[creatorSelect.value].name;

      if (name === creatorName) return;
      if (members.includes(name)) return;

      members.push(name);

      renderMembers();
      renderCreateMemberSelect();
    }

    function renderMembers() {
      membersBox.innerHTML = '';

      members.forEach((m, i) => {
        const d = document.createElement('span');
        d.className = 'tag';
        d.innerHTML = `${escapeHtml(m)} <span onclick="removeCreateMember(${i})">x</span>`;
        membersBox.appendChild(d);
      });
    }

    function removeCreateMember(i) {
      members.splice(i, 1);
      renderMembers();
      renderCreateMemberSelect();
    }

    /* ================= CREATE BILL ================= */

    function createBill() {
      const t = titleInput.value.trim();
      const totalNum = Number(totalInput.value);

      createErr.innerText = '';

      if (!t || !totalNum || members.length < 1) {
        createErr.innerText = '資料不完整';
        return;
      }

      const u = USERS[creatorSelect.value];
      const avg = Math.round(totalNum / members.length);

      const bill = {
        id: Date.now() + '',
        title: t,
        total: totalNum,
        createdBy: u.name,
        bank: u.bank || '',
        account: u.account || '',
        createdAt: new Date(),
        splits: members.map(n => ({
          name: n,
          amount: avg,
          paid: false
        }))
      };

      DB.push(bill);
      openBill(bill.id);
    }

    /* ================= DETAIL - SPLITS ================= */

    function renderSplits() {
      splitsBox.innerHTML = '';

      let sum = 0;
      let unpaidSum = 0;

      current.splits.forEach((s, i) => {
        const val = Number(s.amount) || 0;

        sum += val;
        if (!s.paid) unpaidSum += val;

        const div = document.createElement('div');
        div.className = 'card split' + (s.paid ? ' paid' : '');

        div.innerHTML = `
          <div>${escapeHtml(s.name)}</div>
          <input class="amount-input" type="number" value="${val}"
            onchange="updateAmount(${i}, this.value)">
          <button class="btn btn-light" onclick="togglePaid(${i})">${s.paid ? '已付' : '未付'}</button>
          <button class="btn btn-light" onclick="removePerson(${i})">✕</button>
        `;

        splitsBox.appendChild(div);
      });

      renderDetailAddMemberBox();
      updateSummary(sum, unpaidSum);
    }

    function updateSummary(sum, unpaidSum) {
      unpaidAmount.innerText = unpaidSum;

      const diffValue = sum - Number(current.total || 0);

      if (diffValue !== 0) {
        const abs = Math.abs(diffValue);
        const text = diffValue > 0 ? `多 ${abs}` : `少 ${abs}`;
        diffText.innerText = `金額與總金額不符合（${text}）`;
      } else {
        diffText.innerText = '';
      }
    }

    /* ================= DETAIL - ADD MEMBER ================= */

    function renderDetailAddMemberBox() {
      const addDiv = document.createElement('div');
      addDiv.className = 'card';
      addDiv.innerHTML = `
        <label>新增分帳人</label>

        <div class="row">
          <select id="detailMemberSelect" onchange="handleDetailMemberSelect()"></select>
          <button class="btn btn-primary" onclick="addPersonToCurrentBill()">＋</button>
        </div>

        <div id="detailCustomBox" style="display:none;margin-top:8px;">
          <input id="detailCustomInput" placeholder="輸入名字">
        </div>
      `;

      splitsBox.appendChild(addDiv);
      renderDetailMemberSelect();
    }

    function renderDetailMemberSelect() {
      const select = document.getElementById('detailMemberSelect');
      if (!select) return;

      select.innerHTML = '';

      USERS.forEach((u, i) => {
        if (u.name === current.createdBy) return;
        if (current.splits.some(s => s.name === u.name) && u.name !== '自訂') return;

        const opt = new Option(u.name, i);
        opt.dataset.index = i;
        select.add(opt);
      });

      handleDetailMemberSelect();
    }

    function handleDetailMemberSelect() {
      const select = document.getElementById('detailMemberSelect');
      const box = document.getElementById('detailCustomBox');
      if (!select || !box) return;

      const opt = select.options[select.selectedIndex];
      if (!opt) {
        box.style.display = 'none';
        return;
      }

      const idx = opt.dataset.index;

      if (USERS[idx].name === '自訂') {
        box.style.display = 'block';
      } else {
        box.style.display = 'none';
      }
    }

    function addPersonToCurrentBill() {
      const select = document.getElementById('detailMemberSelect');
      if (!select) return;

      const opt = select.options[select.selectedIndex];
      if (!opt) return;

      const idx = opt.dataset.index;
      const u = USERS[idx];

      let name = u.name;

      if (name === '自訂') {
        const input = document.getElementById('detailCustomInput');
        name = input.value.trim();
        if (!name) return;
        input.value = '';
      }

      if (name === current.createdBy) return;
      if (current.splits.some(s => s.name === name)) return;

      current.splits.push({
        name,
        amount: 0,
        paid: false
      });

      const avg = Math.round(Number(current.total || 0) / current.splits.length);
      current.splits.forEach(s => {
        s.amount = avg;
      });

      renderSplits();
    }

    /* ================= DETAIL - ACTIONS ================= */

    function updateAmount(i, v) {
      current.splits[i].amount = Number(v) || 0;
      renderSplits();
    }

    function togglePaid(i) {
      current.splits[i].paid = !current.splits[i].paid;
      renderSplits();
    }

    function removePerson(i) {
      if (!confirm('刪除這個人？')) return;

      current.splits.splice(i, 1);
      renderSplits();
    }

    function deleteCurrentBill() {
      if (!current) return;
      if (!confirm('確定刪除整筆分帳？')) return;

      DB = DB.filter(b => b.id !== current.id);
      current = null;
      showList();
    }

    function copyAccount() {
      if (!current || !current.account) return;

      navigator.clipboard.writeText(current.account)
        .then(() => alert('已複製'))
        .catch(() => alert(current.account));
    }

    /* ================= UTIL ================= */

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
