<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分帳</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .app {
      max-width: 480px;
      margin: auto;
      padding: 16px;
      padding-bottom: 90px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card.done {
      opacity: .4;
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-light {
      background: #fff;
      border: 1px solid #ccc;
      color: #222;
    }

    .btn-danger {
      background: #fff;
      border: 1px solid #ff4d6d;
      color: #ff4d6d;
    }

    .field {
      margin-bottom: 12px;
    }

    input,
    select {
      width: 100%;
      height: 44px;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 0 10px;
      font-size: 16px;
      background: #fff;
    }

    input:disabled {
      background: #f0f0f0;
      color: #555;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tag {
      background: #eee;
      padding: 6px 10px;
      border-radius: 999px;
      margin-right: 6px;
      margin-top: 8px;
      display: inline-block;
    }

    .tag span {
      color: #888;
      margin-left: 6px;
      cursor: pointer;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 90px 62px 42px;
      gap: 8px;
      align-items: center;
    }

    .split.paid {
      opacity: .4;
    }

    .amount-input {
      width: 90px;
      text-align: right;
    }

    .hint {
      color: #ff4d6d;
      font-size: 13px;
      margin-top: 4px;
    }

    .bottom {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #fff;
      padding: 12px 16px;
      box-shadow: 0 -2px 10px rgba(0, 0, 0, .08);
      font-weight: 700;
    }

    .muted {
      color: #777;
      font-size: 14px;
    }

    h2 {
      margin: 0 0 12px;
    }

    #loadingMask {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, .72);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .loading-box {
      background: #111;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: 700;
    }

    #toastBox {
      position: fixed;
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%);
      max-width: 420px;
      width: calc(100% - 32px);
      background: #111;
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      z-index: 10000;
      font-weight: 700;
      text-align: center;
    }

    #modalMask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .35);
      z-index: 10001;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-box {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 18px;
    }

    #modalText {
      white-space: pre-line;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
  </style>
</head>

<body>
  <div class="app">

    <div id="listPage">
      <div class="header-row">
        <h2>分帳</h2>
        <button class="btn btn-primary" onclick="goCreate()">＋新增</button>
      </div>
      <div id="list"></div>
    </div>

    <div id="createPage" style="display:none;">
      <div class="header-row">
        <h2>新增</h2>
        <button class="btn btn-light" onclick="showList(true)">返回</button>
      </div>

      <div class="card">
        <div class="field">
          <label>標題</label>
          <input id="titleInput" placeholder="ex：電影">
        </div>

        <div class="field">
          <label>總金額</label>
          <input id="totalInput" type="number" placeholder="ex：666">
        </div>

        <div class="field">
          <label>建立人</label>
          <select id="creatorSelect" onchange="handleCreatorChange()"></select>
        </div>

        <div class="field">
          <label>付款方式</label>
          <select id="paymentSelect" onchange="handlePaymentChange()"></select>
        </div>

        <div class="field" id="accountField">
          <label>收款帳號</label>
          <input id="accountInput" placeholder="ex：288816666682">
        </div>

        <div class="field">
          <label>分帳人</label>
          <div class="row">
            <select id="memberSelect" onchange="handleMemberSelect()"></select>
            <button class="btn btn-primary" type="button" onclick="addMember()">＋</button>
          </div>

          <div id="customNameBox" style="display:none;margin-top:8px;">
            <input id="customNameInput" placeholder="輸入名字">
          </div>

          <div id="membersBox"></div>
        </div>

        <div class="hint" id="createErr"></div>

        <button class="btn btn-primary" onclick="createBill()">建立</button>
      </div>
    </div>

    <div id="detailPage" style="display:none;">
      <div class="header-row">
        <h2 id="detailTitle"></h2>
        <button class="btn btn-light" onclick="showList(true)">返回</button>
        <button class="btn btn-danger" onclick="deleteCurrentBill()">刪除整單</button>
      </div>

      <div class="card" style="margin-top:12px;">
        總金額：<b id="detailTotal"></b>
        <div id="diffText" class="hint"></div>
      </div>

      <div class="card">
        收款人：<b id="detailCreator"></b><br>
        <span id="detailTime" class="muted"></span><br>
        帳號：<b id="detailAccount"></b>
        <button id="copyBtn" class="btn btn-light" onclick="copyAccount()">複製</button>
      </div>

      <div id="splitsBox"></div>
    </div>

  </div>

  <div class="bottom" id="bottomBar" style="display:none;">
    <div>未收：<span id="unpaidAmount">0</span></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="openCollectMenu()">
      催款 / 分享
    </button>
  </div>

  <div id="loadingMask">
    <div class="loading-box">處理中...</div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxoX5juqIqqugTMkvAzn5fjXDGV8GnauJ4qv-23jd9YfktQE56sCmu-uWgVIHc15Ohe7g/exec';

    let USERS = [];
    let DB = [];
    let current = null;
    let members = [];
    const PAYMENT_METHODS = [
      { label: '臺灣(004)', bank: '臺灣', code: '004', needAccount: true },
      { label: '土地(005)', bank: '土地', code: '005', needAccount: true },
      { label: '合庫(006)', bank: '合庫', code: '006', needAccount: true },
      { label: '第一(007)', bank: '第一', code: '007', needAccount: true },
      { label: '華南(008)', bank: '華南', code: '008', needAccount: true },
      { label: '彰化(009)', bank: '彰化', code: '009', needAccount: true },
      { label: '上海(011)', bank: '上海', code: '011', needAccount: true },
      { label: '台北富邦(012)', bank: '台北富邦', code: '012', needAccount: true },
      { label: '國泰世華(013)', bank: '國泰世華', code: '013', needAccount: true },
      { label: '高雄(016)', bank: '高雄', code: '016', needAccount: true },
      { label: '兆豐(017)', bank: '兆豐', code: '017', needAccount: true },
      { label: '王道(048)', bank: '王道', code: '048', needAccount: true },
      { label: '臺企銀(050)', bank: '臺企銀', code: '050', needAccount: true },
      { label: '渣打(052)', bank: '渣打', code: '052', needAccount: true },
      { label: '台中(053)', bank: '台中', code: '053', needAccount: true },
      { label: '京城(054)', bank: '京城', code: '054', needAccount: true },
      { label: '匯豐(081)', bank: '匯豐', code: '081', needAccount: true },
      { label: '瑞興(101)', bank: '瑞興', code: '101', needAccount: true },
      { label: '華泰(102)', bank: '華泰', code: '102', needAccount: true },
      { label: '新光(103)', bank: '新光', code: '103', needAccount: true },
      { label: '陽信(108)', bank: '陽信', code: '108', needAccount: true },
      { label: '板信(118)', bank: '板信', code: '118', needAccount: true },
      { label: '三信(147)', bank: '三信', code: '147', needAccount: true },
      { label: '中華郵政(700)', bank: '中華郵政', code: '700', needAccount: true },
      { label: '聯邦(803)', bank: '聯邦', code: '803', needAccount: true },
      { label: '遠東(805)', bank: '遠東', code: '805', needAccount: true },
      { label: '元大(806)', bank: '元大', code: '806', needAccount: true },
      { label: '永豐(807)', bank: '永豐', code: '807', needAccount: true },
      { label: '玉山(808)', bank: '玉山', code: '808', needAccount: true },
      { label: '凱基(809)', bank: '凱基', code: '809', needAccount: true },
      { label: '星展(810)', bank: '星展', code: '810', needAccount: true },
      { label: '台新(812)', bank: '台新', code: '812', needAccount: true },
      { label: '日盛(815)', bank: '日盛', code: '815', needAccount: true },
      { label: '安泰(816)', bank: '安泰', code: '816', needAccount: true },
      { label: '中國信託(822)', bank: '中國信託', code: '822', needAccount: true },
      { label: '將來(823)', bank: '將來', code: '823', needAccount: true },
      { label: '連線(824)', bank: '連線', code: '824', needAccount: true },
      { label: '樂天(826)', bank: '樂天', code: '826', needAccount: true },
      { label: 'LinePay', bank: 'LinePay', code: '', needAccount: false },
      { label: '現金', bank: '現金', code: '', needAccount: false }
    ];

    /* ================= API ================= */

    let writeRunning = false;

    const WRITE_ACTIONS = new Set([
      'CREATE_BILL',
      'UPDATE_MEMBER_AMOUNT',
      'TOGGLE_MEMBER_PAID',
      'ADD_MEMBER_AND_REBALANCE',
      'DELETE_MEMBER',
      'DELETE_BILL'
    ]);

    const FULL_LOADING_ACTIONS = new Set([
      'CREATE_BILL',
      'ADD_MEMBER_AND_REBALANCE',
      'DELETE_MEMBER',
      'DELETE_BILL'
    ]);

    async function api(action, payload = {}) {
      const isWrite = WRITE_ACTIONS.has(action);
      const useFullLoading = FULL_LOADING_ACTIONS.has(action);

      if (isWrite && writeRunning) {
        showToast('資料儲存中，請稍候');
        return Promise.reject({ silent: true });
      }

      if (isWrite) writeRunning = true;
      if (useFullLoading) showLoading();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({ action, ...payload })
        });

        const json = await res.json();

        if (!json.success) {
          throw new Error(json.message || 'API error');
        }

        return json.data;

      } finally {
        if (isWrite) writeRunning = false;
        if (useFullLoading) hideLoading();
      }
    }

    function showLoading() {
      loadingMask.style.display = 'flex';
    }

    function hideLoading() {
      loadingMask.style.display = 'none';
    }

    /* ================= INIT ================= */

    init();

    async function init() {
      list.innerHTML = '<div class="card muted">資料讀取中...</div>';

      try {
        const data = await api('INIT_DATA');

        USERS = data.accounts || [];
        DB = data.bills || [];

        creatorSelect.innerHTML = '';
        USERS.forEach((u, i) => {
          creatorSelect.add(new Option(u.name, i));
        });

        initPaymentSelect();
        updateAccountDisplay();
        renderCreateMemberSelect();
        showList(false);

      } catch (err) {
        list.innerHTML = '<div class="card hint">讀取失敗，請重新整理</div>';
        showMessage(err.message);
      }
    }

    function openCollectMenu() {
      shareReminder();
    }

    function buildReminderText() {
      if (!current) return '';

      const unpaid = current.splits.filter(s => !s.paid);

      const unpaidText = unpaid.length
        ? unpaid
          .map(s => `✨ ${s.name} $${Number(s.amount || 0).toLocaleString()}`)
          .join('\n')
        : '🎉 大家都付完了，好讚！';

      const payInfo = current.account
        ? `${current.bank} ${current.account}`
        : current.bank;

      const total = Number(current.total || 0).toLocaleString();
      const pageUrl = window.location.href;

      return `我來收帳啦😆

✨ ${current.title}
總共 $${total}
------
${unpaidText}

帳號在這👇
${payInfo}
轉完點一下已付🙌
${pageUrl}
謝謝大家～🫪🫪🫪`;
    }

    async function shareReminder() {
      const text = buildReminderText();
      if (!text) return;

      if (navigator.share) {
        try {
          await navigator.share({
            title: current.title,
            text
          });
          return;
        } catch (err) {
          if (err.name === 'AbortError') return;
        }
      }

      copyReminderText();
    }

    function copyReminderText() {
      const text = buildReminderText();
      if (!text) return;

      navigator.clipboard.writeText(text)
        .then(() => showToast('已複製催款訊息，可貼到對話框'))
        .catch(() => showMessage('複製失敗，請手動複製：\n' + text));
    }
    /* ================= PAGE ================= */

    async function showList(needRefresh) {
      listPage.style.display = 'block';
      createPage.style.display = 'none';
      detailPage.style.display = 'none';
      bottomBar.style.display = 'none';

      renderBillList();

      if (needRefresh) {
        try {
          DB = await api('GET_LIST');
          renderBillList();
        } catch (err) {
          showMessage(err.message);
        }
      }
    }

    function goCreate() {
      members = [];

      titleInput.value = '';
      totalInput.value = '';
      createErr.innerText = '';
      customNameInput.value = '';
      customNameBox.style.display = 'none';
      updateAccountDisplay();
      renderMembers();
      renderCreateMemberSelect();

      listPage.style.display = 'none';
      createPage.style.display = 'block';
      detailPage.style.display = 'none';
      bottomBar.style.display = 'none';
    }

    async function openBill(id) {
      try {
        current = null;

        listPage.style.display = 'none';
        createPage.style.display = 'none';
        detailPage.style.display = 'block';
        bottomBar.style.display = 'none';

        detailTitle.innerText = '讀取中...';
        detailTotal.innerText = '';
        detailCreator.innerText = '';
        detailTime.innerText = '';
        detailAccount.innerText = '';
        splitsBox.innerHTML = '<div class="card muted">明細讀取中...</div>';

        current = await api('GET_BILL', { billId: id });
        renderCurrentBill();

        bottomBar.style.display = 'block';

      } catch (err) {
        showMessage(err.message);
        showList(false);
      }
    }

    function formatDateOnly(value) {
      if (!value) return '';

      const text = String(value);

      // GAS 回 yyyy-MM-dd HH:mm:ss 時，直接取前 10 碼最穩
      if (/^\d{4}-\d{2}-\d{2}/.test(text)) {
        return text.slice(0, 10);
      }

      const d = new Date(value);
      if (isNaN(d.getTime())) return text;

      return d.toLocaleDateString('zh-TW');
    }
    function renderCurrentBill() {
      detailTitle.innerText = current.title;
      detailTotal.innerText = '$' + current.total;
      detailCreator.innerText = current.createdBy;
      detailTime.innerText = formatDateOnly(current.createdAt);

      document.getElementById('copyBtn').style.display =
        current.account ? 'inline-block' : 'none';

      detailAccount.innerText = current.account
        ? current.bank + ' ' + current.account
        : current.bank;

      renderSplits();
    }

    /* ================= LIST ================= */

    function renderBillList() {
      list.innerHTML = '';

      if (!DB || DB.length === 0) {
        list.innerHTML = '<div class="card muted"></div>';
        return;
      }

      DB.forEach(b => {
        const div = document.createElement('div');
        div.className = 'card' + (b.allPaid ? ' done' : '');
        const dateText = formatDateOnly(b.createdAt);
        div.innerHTML = `
          <div style="font-weight:700">
            ${escapeHtml(b.title)}  ${dateText}
          </div>
          <div>$${b.total}</div>
          <div class="muted">
            建立人：${escapeHtml(b.createdBy)}<br>
          </div>
        `;
        div.onclick = () => openBill(b.id);
        list.appendChild(div);
      });
    }

    /* ================= CREATE - CREATOR ================= */
    function initPaymentSelect() {
      paymentSelect.innerHTML = '';

      PAYMENT_METHODS.forEach((p, i) => {
        paymentSelect.add(new Option(p.label, i));
      });
    }

    function findPaymentIndexByBank(bank) {
      const cleanBank = String(bank || '')
        .trim()
        .replace(/銀行/g, '')
        .replace(/\s+/g, '')
        .toLowerCase();

      let idx = PAYMENT_METHODS.findIndex(p =>
        p.bank.replace(/\s+/g, '').toLowerCase() === cleanBank
      );
      if (idx >= 0) return idx;

      idx = PAYMENT_METHODS.findIndex(p =>
        p.label.replace(/\s+/g, '').toLowerCase() === cleanBank
      );
      if (idx >= 0) return idx;

      idx = PAYMENT_METHODS.findIndex(p =>
        cleanBank.includes(p.bank.replace(/\s+/g, '').toLowerCase())
      );
      if (idx >= 0) return idx;

      return 0;
    }

    function handlePaymentChange() {
      const p = PAYMENT_METHODS[paymentSelect.value];

      if (!p.needAccount) {
        accountField.style.display = 'none';
        accountInput.value = '';
      } else {
        accountField.style.display = 'block';
      }
    }

    function getSelectedPayment() {
      return PAYMENT_METHODS[paymentSelect.value];
    }
    function handleCreatorChange() {
      updateAccountDisplay();

      const creatorName = USERS[creatorSelect.value].name;
      members = members.filter(m => m !== creatorName);

      renderMembers();
      renderCreateMemberSelect();
    }

    function updateAccountDisplay() {
      const u = USERS[creatorSelect.value];

      const idx = findPaymentIndexByBank(u && u.bank ? u.bank : '');
      paymentSelect.value = String(idx);

      const p = getSelectedPayment();

      if (p.needAccount) {
        accountInput.value = u && u.account ? u.account : '';
      } else {
        accountInput.value = '';
      }

      handlePaymentChange();
    }

    /* ================= CREATE - MEMBER SELECT ================= */

    function renderCreateMemberSelect() {
      memberSelect.innerHTML = '';

      USERS.forEach((u, i) => {
        if (u.name === USERS[creatorSelect.value].name) return;
        if (members.includes(u.name)) return;

        const opt = new Option(u.name, i);
        opt.dataset.index = i;
        memberSelect.add(opt);
      });

      const customOpt = new Option('自訂', 'custom');
      customOpt.dataset.index = 'custom';
      memberSelect.add(customOpt);

      handleMemberSelect();
    }

    function handleMemberSelect() {
      const opt = memberSelect.options[memberSelect.selectedIndex];

      if (!opt) {
        customNameBox.style.display = 'none';
        return;
      }

      customNameBox.style.display =
        opt.dataset.index === 'custom' ? 'block' : 'none';
    }

    function addMember() {
      const opt = memberSelect.options[memberSelect.selectedIndex];
      if (!opt) return;

      let name;

      if (opt.dataset.index === 'custom') {
        name = customNameInput.value.trim();
        if (!name) return;
        customNameInput.value = '';
      } else {
        const u = USERS[opt.dataset.index];
        name = u.name;
      }

      const creatorName = USERS[creatorSelect.value].name;

      if (name === creatorName) return;
      if (members.includes(name)) return;

      members.push(name);
      renderMembers();
      renderCreateMemberSelect();
    }

    function renderMembers() {
      membersBox.innerHTML = '';

      members.forEach((m, i) => {
        const d = document.createElement('span');
        d.className = 'tag';
        d.innerHTML = `${escapeHtml(m)} <span onclick="removeCreateMember(${i})">x</span>`;
        membersBox.appendChild(d);
      });
    }

    function removeCreateMember(i) {
      members.splice(i, 1);
      renderMembers();
      renderCreateMemberSelect();
    }

    /* ================= CREATE BILL ================= */

    async function createBill() {
      const t = titleInput.value.trim();
      const totalNum = Number(totalInput.value);

      createErr.innerText = '';

      if (!t) {
        createErr.innerText = '請輸入標題';
        return;
      }

      if (!totalInput.value) {
        createErr.innerText = '請輸入總金額';
        return;
      }

      if (isNaN(totalNum) || totalNum <= 0) {
        createErr.innerText = '總金額必須大於 0';
        return;
      }

      if (members.length < 1) {
        createErr.innerText = '請至少新增 1 位分帳人';
        return;
      }

      const u = USERS[creatorSelect.value];
      const payment = getSelectedPayment();
      const bank = payment.bank;
      const account = payment.needAccount ? accountInput.value.trim() : '';
      const avg = Math.round(totalNum / members.length);

      if (!bank) {
        createErr.innerText = '請選擇付款方式';
        return;
      }

      if (payment.needAccount && !account) {
        createErr.innerText = '請輸入收款帳號';
        return;
      }

      try {
        const result = await api('CREATE_BILL', {
          title: t,
          total: totalNum,
          createdBy: u.name,
          bank,
          account,
          splits: members.map(n => ({
            name: n,
            amount: avg
          }))
        });

        current = result.bill;

        if (result.accountUpdated) {
          const user = USERS.find(x => x.name === u.name);
          if (user) {
            user.bank = bank;
            user.account = account;
          }

          showToast('帳戶資訊已更新，以後會使用這組新的帳戶');
        }
        renderCurrentBill();

        listPage.style.display = 'none';
        createPage.style.display = 'none';
        detailPage.style.display = 'block';
        bottomBar.style.display = 'block';

      } catch (err) {
        if (isSilentError(err)) return;
        createErr.innerText = err.message;
      }
    }

    /* ================= DETAIL - SPLITS ================= */

    function renderSplits() {
      splitsBox.innerHTML = '';

      let sum = 0;
      let unpaidSum = 0;

      current.splits.forEach((s, i) => {
        const val = Number(s.amount) || 0;

        sum += val;
        if (!s.paid) unpaidSum += val;

        const div = document.createElement('div');
        div.className = 'card split' + (s.paid ? ' paid' : '');

        div.innerHTML = `
          <div>${escapeHtml(s.name)}</div>
          <input class="amount-input" type="number" value="${val}"
            onchange="updateAmount(${i}, this.value)">
          <button class="btn btn-light" onclick="togglePaid(${i})">${s.paid ? '已付' : '未付'}</button>
          <button class="btn btn-light" onclick="removePerson(${i})">✕</button>
        `;

        splitsBox.appendChild(div);
      });

      renderDetailAddMemberBox();
      updateSummary(sum, unpaidSum);
    }

    function updateSummary(sum, unpaidSum) {
      unpaidAmount.innerText = unpaidSum;

      const diffValue = sum - Number(current.total || 0);

      if (diffValue !== 0) {
        const abs = Math.abs(diffValue);
        const text = diffValue > 0 ? `多 ${abs}` : `少 ${abs}`;
        diffText.innerText = `金額與總金額不符合（${text}）`;
      } else {
        diffText.innerText = '';
      }
    }

    /* ================= DETAIL - ADD MEMBER ================= */

    function renderDetailAddMemberBox() {
      const addDiv = document.createElement('div');
      addDiv.className = 'card';

      addDiv.innerHTML = `
        <label>新增分帳人</label>
        <div class="row">
          <select id="detailMemberSelect" onchange="handleDetailMemberSelect()"></select>
          <button class="btn btn-primary" onclick="addPersonToCurrentBill()">＋</button>
        </div>
        <div id="detailCustomBox" style="display:none;margin-top:8px;">
          <input id="detailCustomInput" placeholder="輸入名字">
        </div>
      `;

      splitsBox.appendChild(addDiv);
      renderDetailMemberSelect();
    }

    function renderDetailMemberSelect() {
      const select = document.getElementById('detailMemberSelect');
      if (!select) return;

      select.innerHTML = '';

      USERS.forEach((u, i) => {
        if (u.name === current.createdBy) return;
        if (current.splits.some(s => s.name === u.name)) return;

        const opt = new Option(u.name, i);
        opt.dataset.index = i;
        select.add(opt);
      });

      const customOpt = new Option('自訂', 'custom');
      customOpt.dataset.index = 'custom';
      select.add(customOpt);

      handleDetailMemberSelect();
    }

    function handleDetailMemberSelect() {
      const select = document.getElementById('detailMemberSelect');
      const box = document.getElementById('detailCustomBox');

      if (!select || !box) return;

      const opt = select.options[select.selectedIndex];

      box.style.display =
        opt && opt.dataset.index === 'custom' ? 'block' : 'none';
    }

    async function addPersonToCurrentBill() {
      const select = document.getElementById('detailMemberSelect');
      if (!select) return;

      const opt = select.options[select.selectedIndex];
      if (!opt) return;

      let name;

      if (opt.dataset.index === 'custom') {
        const input = document.getElementById('detailCustomInput');
        name = input.value.trim();
        if (!name) return;
        input.value = '';
      } else {
        name = USERS[opt.dataset.index].name;
      }

      if (name === current.createdBy) return;
      if (current.splits.some(s => s.name === name)) return;

      try {
        current = await api('ADD_MEMBER_AND_REBALANCE', {
          billId: current.id,
          name
        });

        renderCurrentBill();

      } catch (err) {
        if (isSilentError(err)) return;
        showMessage(err.message);
      }
    }
    /* ================= DETAIL - ACTIONS ================= */

    async function updateAmount(i, v) {
      const s = current.splits[i];
      const amount = Number(v) || 0;

      try {
        current = await api('UPDATE_MEMBER_AMOUNT', {
          billId: current.id,
          memberId: s.memberId,
          amount
        });

        renderCurrentBill();

      } catch (err) {
        if (isSilentError(err)) return;
        showMessage(err.message);
        await openBill(current.id);
      }
    }

    async function togglePaid(i) {
      const s = current.splits[i];
      const oldPaid = s.paid;

      s.paid = !s.paid;
      renderCurrentBill();

      try {
        current = await api('TOGGLE_MEMBER_PAID', {
          billId: current.id,
          memberId: s.memberId,
          paid: s.paid
        });

        renderCurrentBill();

      } catch (err) {
        s.paid = oldPaid;
        renderCurrentBill();

        if (isSilentError(err)) return;

        showMessage(err.message);
      }
    }

    async function removePerson(i) {
      const ok = await showConfirm('確定刪除這個人？');
      if (!ok) return;

      const s = current.splits[i];

      try {
        current = await api('DELETE_MEMBER', {
          billId: current.id,
          memberId: s.memberId
        });

        renderCurrentBill();

      } catch (err) {
        if (isSilentError(err)) return;
        showMessage(err.message);
      }
    }

    async function deleteCurrentBill() {
      if (!current) {
        showMessage('目前沒有開啟的分帳單');
        return;
      }

      const ok = await showConfirm('確定刪除整筆分帳？');
      if (!ok) return;

      try {
        await api('DELETE_BILL', {
          billId: current.id
        });

        current = null;
        await showList(true);

      } catch (err) {
        if (isSilentError(err)) return;
        showMessage('刪除失敗：' + err.message);
      }
    }

    function copyAccount() {
      if (!current.account) { return; }
      navigator.clipboard.writeText(current.account)
        .then(() => showToast('已複製帳號，可直接貼到銀行 App'))
        .catch(() => showMessage('瀏覽器阻擋複製，請手動複製：\n' + current.account));
    }

    /* ================= UTIL ================= */

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
    function isSilentError(err) {
      return err && err.silent;
    }
    function showToast(message) {
      toastBox.innerText = message;
      toastBox.style.display = 'block';

      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toastBox.style.display = 'none';
      }, 1800);
    }

    function showMessage(message) {
      return showConfirm(message, {
        okText: '知道了',
        cancelText: '',
        hideCancel: true
      });
    }

    function showConfirm(message, options = {}) {
      return new Promise(resolve => {
        modalText.innerText = message;

        modalOkBtn.innerText = options.okText || '確定';
        modalCancelBtn.innerText = options.cancelText || '取消';

        modalCancelBtn.style.display = options.hideCancel ? 'none' : 'inline-block';
        modalMask.style.display = 'flex';

        modalOkBtn.onclick = () => {
          modalMask.style.display = 'none';
          resolve(true);
        };

        modalCancelBtn.onclick = () => {
          modalMask.style.display = 'none';
          resolve(false);
        };
      });
    }
  </script>
  <div id="toastBox" style="display:none;"></div>

  <div id="modalMask" style="display:none;">
    <div class="modal-box">
      <div id="modalText"></div>
      <div class="modal-actions">
        <button class="btn btn-light" id="modalCancelBtn">取消</button>
        <button class="btn btn-primary" id="modalOkBtn">確定</button>
      </div>
    </div>
  </div>
</body>

</html>
