<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分帳</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .app {
      max-width: 480px;
      margin: auto;
      padding: 16px;
      padding-bottom: 90px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card.done {
      opacity: .4;
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-light {
      background: #fff;
      border: 1px solid #ccc;
      color: #222;
    }

    .btn-danger {
      background: #fff;
      border: 1px solid #ff4d6d;
      color: #ff4d6d;
    }

    .field {
      margin-bottom: 12px;
    }

    input,
    select {
      width: 100%;
      height: 44px;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 0 10px;
      font-size: 16px;
      background: #fff;
    }

    input:disabled {
      background: #f0f0f0;
      color: #555;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tag {
      background: #eee;
      padding: 6px 10px;
      border-radius: 999px;
      margin-right: 6px;
      margin-top: 8px;
      display: inline-block;
    }

    .tag span {
      color: #888;
      margin-left: 6px;
      cursor: pointer;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 90px 62px 42px;
      gap: 8px;
      align-items: center;
    }

    .split.paid {
      opacity: .4;
    }

    .amount-input {
      width: 90px;
      text-align: right;
    }

    .hint {
      color: #ff4d6d;
      font-size: 13px;
      margin-top: 4px;
    }

    .bottom {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #fff;
      padding: 12px 16px;
      box-shadow: 0 -2px 10px rgba(0, 0, 0, .08);
      font-weight: 700;
    }

    .muted {
      color: #777;
      font-size: 14px;
    }

    h2 {
      margin: 0 0 12px;
    }

    #loadingMask {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, .72);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .loading-box {
      background: #111;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="app">

    <div id="listPage">
      <div class="header-row">
        <h2>分帳</h2>
        <button class="btn btn-primary" onclick="goCreate()">＋新增</button>
      </div>
      <div id="list"></div>
    </div>

    <div id="createPage" style="display:none;">
      <div class="header-row">
        <h2>新增</h2>
        <button class="btn btn-light" onclick="showList(true)">返回</button>
      </div>

      <div class="card">
        <div class="field">
          <label>標題</label>
          <input id="titleInput" placeholder="ex：電影">
        </div>

        <div class="field">
          <label>總金額</label>
          <input id="totalInput" type="number" placeholder="ex：666">
        </div>

        <div class="field">
          <label>建立人</label>
          <select id="creatorSelect" onchange="handleCreatorChange()"></select>
        </div>

        <div class="field">
          <label>銀行 / 付款方式</label>
          <input id="bankInput" placeholder="ex：台新銀行">
        </div>

        <div class="field">
          <label>收款帳號</label>
          <input id="accountInput" placeholder="ex：288816666682">
        </div>

        <div class="field">
          <label>分帳人</label>
          <div class="row">
            <select id="memberSelect" onchange="handleMemberSelect()"></select>
            <button class="btn btn-primary" type="button" onclick="addMember()">＋</button>
          </div>

          <div id="customNameBox" style="display:none;margin-top:8px;">
            <input id="customNameInput" placeholder="輸入名字">
          </div>

          <div id="membersBox"></div>
        </div>

        <div class="hint" id="createErr"></div>

        <button class="btn btn-primary" onclick="createBill()">建立</button>
      </div>
    </div>

    <div id="detailPage" style="display:none;">
      <div class="header-row">
        <h2 id="detailTitle"></h2>
        <button class="btn btn-light" onclick="showList(true)">返回</button>
        <button class="btn btn-danger" onclick="deleteCurrentBill()">刪除整單</button>
      </div>

      <div class="card" style="margin-top:12px;">
        總金額：<b id="detailTotal"></b>
        <div id="diffText" class="hint"></div>
      </div>

      <div class="card">
        收款人：<b id="detailCreator"></b><br>
        <span id="detailTime" class="muted"></span><br>
        帳號：<b id="detailAccount"></b>
        <button class="btn btn-light" onclick="copyAccount()">複製</button>
      </div>

      <div id="splitsBox"></div>
    </div>

  </div>

  <div class="bottom" id="bottomBar" style="display:none;">
    未收：<span id="unpaidAmount">0</span>
  </div>

  <div id="loadingMask">
    <div class="loading-box">處理中...</div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyunKl7L6VSsWEmzduEnLVvyIbLcA5omca5Ne2HzDVaN3oFWztWhlBQmSStW7zp_uSuVw/exec';

    let USERS = [];
    let DB = [];
    let current = null;
    let members = [];
    let apiRunning = false;

    /* ================= API ================= */

    async function api(action, payload = {}) {
      if (apiRunning) throw new Error('處理中');

      apiRunning = true;
      showLoading();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({ action, ...payload })
        });

        const json = await res.json();

        if (!json.success) {
          throw new Error(json.message || 'API error');
        }

        return json.data;

      } finally {
        apiRunning = false;
        hideLoading();
      }
    }

    function showLoading() {
      loadingMask.style.display = 'flex';
    }

    function hideLoading() {
      loadingMask.style.display = 'none';
    }

    /* ================= INIT ================= */

    init();

    async function init() {
      try {
        const data = await api('INIT_DATA');

        USERS = data.accounts || [];
        DB = data.bills || [];

        creatorSelect.innerHTML = '';
        USERS.forEach((u, i) => {
          creatorSelect.add(new Option(u.name, i));
        });

        updateAccountDisplay();
        renderCreateMemberSelect();
        showList(false);

      } catch (err) {
        alert(err.message);
      }
    }

    /* ================= PAGE ================= */

    async function showList(needRefresh) {
      listPage.style.display = 'block';
      createPage.style.display = 'none';
      detailPage.style.display = 'none';
      bottomBar.style.display = 'none';

      if (needRefresh) {
        try {
          DB = await api('GET_LIST');
        } catch (err) {
          alert(err.message);
        }
      }

      renderBillList();
    }

    function goCreate() {
      members = [];

      titleInput.value = '';
      totalInput.value = '';
      createErr.innerText = '';
      customNameInput.value = '';
      customNameBox.style.display = 'none';
      updateAccountDisplay();
      renderMembers();
      renderCreateMemberSelect();

      listPage.style.display = 'none';
      createPage.style.display = 'block';
      detailPage.style.display = 'none';
      bottomBar.style.display = 'none';
    }

    async function openBill(id) {
      try {
        current = await api('GET_BILL', { billId: id });
        renderCurrentBill();

        listPage.style.display = 'none';
        createPage.style.display = 'none';
        detailPage.style.display = 'block';
        bottomBar.style.display = 'block';

      } catch (err) {
        alert(err.message);
      }
    }
    function formatDateOnly(value) {
      if (!value) return '';

      const text = String(value);

      // GAS 回 yyyy-MM-dd HH:mm:ss 時，直接取前 10 碼最穩
      if (/^\d{4}-\d{2}-\d{2}/.test(text)) {
        return text.slice(0, 10);
      }

      const d = new Date(value);
      if (isNaN(d.getTime())) return text;

      return d.toLocaleDateString('zh-TW');
    }
    function renderCurrentBill() {
      detailTitle.innerText = current.title;
      detailTotal.innerText = '$' + current.total;
      detailCreator.innerText = current.createdBy;
      detailTime.innerText = formatDateOnly(current.createdAt);
      detailAccount.innerText = current.bank + ' ' + current.account;
      renderSplits();
    }

    /* ================= LIST ================= */

    function renderBillList() {
      list.innerHTML = '';

      if (!DB || DB.length === 0) {
        list.innerHTML = '<div class="card muted"></div>';
        return;
      }

      DB.forEach(b => {
        const div = document.createElement('div');
        div.className = 'card' + (b.allPaid ? ' done' : '');
        div.innerHTML = `
          <div style="font-weight:700">${escapeHtml(b.title)}</div>
          <div>$${b.total}</div>
          <div class="muted">建立人：${escapeHtml(b.createdBy)}</div>
        `;
        div.onclick = () => openBill(b.id);
        list.appendChild(div);
      });
    }

    /* ================= CREATE - CREATOR ================= */

    function handleCreatorChange() {
      updateAccountDisplay();

      const creatorName = USERS[creatorSelect.value].name;
      members = members.filter(m => m !== creatorName);

      renderMembers();
      renderCreateMemberSelect();
    }

    function updateAccountDisplay() {
      const u = USERS[creatorSelect.value];
      bankInput.value = u && u.bank ? u.bank : '';
      accountInput.value = u && u.account ? u.account : '';
    }

    /* ================= CREATE - MEMBER SELECT ================= */

    function renderCreateMemberSelect() {
      memberSelect.innerHTML = '';

      USERS.forEach((u, i) => {
        if (u.name === USERS[creatorSelect.value].name) return;
        if (members.includes(u.name)) return;

        const opt = new Option(u.name, i);
        opt.dataset.index = i;
        memberSelect.add(opt);
      });

      const customOpt = new Option('自訂', 'custom');
      customOpt.dataset.index = 'custom';
      memberSelect.add(customOpt);

      handleMemberSelect();
    }

    function handleMemberSelect() {
      const opt = memberSelect.options[memberSelect.selectedIndex];

      if (!opt) {
        customNameBox.style.display = 'none';
        return;
      }

      customNameBox.style.display =
        opt.dataset.index === 'custom' ? 'block' : 'none';
    }

    function addMember() {
      const opt = memberSelect.options[memberSelect.selectedIndex];
      if (!opt) return;

      let name;

      if (opt.dataset.index === 'custom') {
        name = customNameInput.value.trim();
        if (!name) return;
        customNameInput.value = '';
      } else {
        const u = USERS[opt.dataset.index];
        name = u.name;
      }

      const creatorName = USERS[creatorSelect.value].name;

      if (name === creatorName) return;
      if (members.includes(name)) return;

      members.push(name);
      renderMembers();
      renderCreateMemberSelect();
    }

    function renderMembers() {
      membersBox.innerHTML = '';

      members.forEach((m, i) => {
        const d = document.createElement('span');
        d.className = 'tag';
        d.innerHTML = `${escapeHtml(m)} <span onclick="removeCreateMember(${i})">x</span>`;
        membersBox.appendChild(d);
      });
    }

    function removeCreateMember(i) {
      members.splice(i, 1);
      renderMembers();
      renderCreateMemberSelect();
    }

    /* ================= CREATE BILL ================= */

    async function createBill() {
      const t = titleInput.value.trim();
      const totalNum = Number(totalInput.value);

      createErr.innerText = '';

      if (!t) {
        createErr.innerText = '請輸入標題';
        return;
      }

      if (!totalInput.value) {
        createErr.innerText = '請輸入總金額';
        return;
      }

      if (isNaN(totalNum) || totalNum <= 0) {
        createErr.innerText = '總金額必須大於 0';
        return;
      }

      if (members.length < 1) {
        createErr.innerText = '請至少新增 1 位分帳人';
        return;
      }

      const u = USERS[creatorSelect.value];
      const bank = bankInput.value.trim();
      const account = accountInput.value.trim();
      const avg = Math.round(totalNum / members.length);

      if (!bank) {
        createErr.innerText = '請輸入銀行 / 付款方式';
        return;
      }

      if (!account) {
        createErr.innerText = '請輸入收款帳號';
        return;
      }

      try {
        const result = await api('CREATE_BILL', {
          title: t,
          total: totalNum,
          createdBy: u.name,
          bank,
          account,
          splits: members.map(n => ({
            name: n,
            amount: avg
          }))
        });

        current = result.bill;

        if (result.accountUpdated) {
          const user = USERS.find(x => x.name === u.name);
          if (user) {
            user.bank = bank;
            user.account = account;
          }

          alert('帳戶資訊已更新，以後會使用這組新的帳戶');
        }
        renderCurrentBill();

        listPage.style.display = 'none';
        createPage.style.display = 'none';
        detailPage.style.display = 'block';
        bottomBar.style.display = 'block';

      } catch (err) {
        createErr.innerText = err.message;
      }
    }

    /* ================= DETAIL - SPLITS ================= */

    function renderSplits() {
      splitsBox.innerHTML = '';

      let sum = 0;
      let unpaidSum = 0;

      current.splits.forEach((s, i) => {
        const val = Number(s.amount) || 0;

        sum += val;
        if (!s.paid) unpaidSum += val;

        const div = document.createElement('div');
        div.className = 'card split' + (s.paid ? ' paid' : '');

        div.innerHTML = `
          <div>${escapeHtml(s.name)}</div>
          <input class="amount-input" type="number" value="${val}"
            onchange="updateAmount(${i}, this.value)">
          <button class="btn btn-light" onclick="togglePaid(${i})">${s.paid ? '已付' : '未付'}</button>
          <button class="btn btn-light" onclick="removePerson(${i})">✕</button>
        `;

        splitsBox.appendChild(div);
      });

      renderDetailAddMemberBox();
      updateSummary(sum, unpaidSum);
    }

    function updateSummary(sum, unpaidSum) {
      unpaidAmount.innerText = unpaidSum;

      const diffValue = sum - Number(current.total || 0);

      if (diffValue !== 0) {
        const abs = Math.abs(diffValue);
        const text = diffValue > 0 ? `多 ${abs}` : `少 ${abs}`;
        diffText.innerText = `金額與總金額不符合（${text}）`;
      } else {
        diffText.innerText = '';
      }
    }

    /* ================= DETAIL - ADD MEMBER ================= */

    function renderDetailAddMemberBox() {
      const addDiv = document.createElement('div');
      addDiv.className = 'card';

      addDiv.innerHTML = `
        <label>新增分帳人</label>
        <div class="row">
          <select id="detailMemberSelect" onchange="handleDetailMemberSelect()"></select>
          <button class="btn btn-primary" onclick="addPersonToCurrentBill()">＋</button>
        </div>
        <div id="detailCustomBox" style="display:none;margin-top:8px;">
          <input id="detailCustomInput" placeholder="輸入名字">
        </div>
      `;

      splitsBox.appendChild(addDiv);
      renderDetailMemberSelect();
    }

    function renderDetailMemberSelect() {
      const select = document.getElementById('detailMemberSelect');
      if (!select) return;

      select.innerHTML = '';

      USERS.forEach((u, i) => {
        if (u.name === current.createdBy) return;
        if (current.splits.some(s => s.name === u.name)) return;

        const opt = new Option(u.name, i);
        opt.dataset.index = i;
        select.add(opt);
      });

      const customOpt = new Option('自訂', 'custom');
      customOpt.dataset.index = 'custom';
      select.add(customOpt);

      handleDetailMemberSelect();
    }

    function handleDetailMemberSelect() {
      const select = document.getElementById('detailMemberSelect');
      const box = document.getElementById('detailCustomBox');

      if (!select || !box) return;

      const opt = select.options[select.selectedIndex];

      box.style.display =
        opt && opt.dataset.index === 'custom' ? 'block' : 'none';
    }

    async function addPersonToCurrentBill() {
      const select = document.getElementById('detailMemberSelect');
      if (!select) return;

      const opt = select.options[select.selectedIndex];
      if (!opt) return;

      let name;

      if (opt.dataset.index === 'custom') {
        const input = document.getElementById('detailCustomInput');
        name = input.value.trim();
        if (!name) return;
        input.value = '';
      } else {
        name = USERS[opt.dataset.index].name;
      }

      if (name === current.createdBy) return;
      if (current.splits.some(s => s.name === name)) return;

      try {
        current = await api('ADD_MEMBER_AND_REBALANCE', {
          billId: current.id,
          name
        });

        renderCurrentBill();

      } catch (err) {
        alert(err.message);
      }
    }
    /* ================= DETAIL - ACTIONS ================= */

    async function updateAmount(i, v) {
      const s = current.splits[i];
      const amount = Number(v) || 0;

      try {
        current = await api('UPDATE_MEMBER_AMOUNT', {
          billId: current.id,
          memberId: s.memberId,
          amount
        });

        renderCurrentBill();

      } catch (err) {
        alert(err.message);
        await openBill(current.id);
      }
    }

    async function togglePaid(i) {
      const s = current.splits[i];

      try {
        current = await api('TOGGLE_MEMBER_PAID', {
          billId: current.id,
          memberId: s.memberId,
          paid: !s.paid
        });

        renderCurrentBill();

      } catch (err) {
        alert(err.message);
      }
    }

    async function removePerson(i) {
      if (!confirm('刪除這個人？')) return;

      const s = current.splits[i];

      try {
        current = await api('DELETE_MEMBER', {
          billId: current.id,
          memberId: s.memberId
        });

        renderCurrentBill();

      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteCurrentBill() {
      if (!current) return;
      if (!confirm('確定刪除整筆分帳？')) return;

      try {
        await api('DELETE_BILL', {
          billId: current.id
        });

        current = null;
        await showList(true);

      } catch (err) {
        alert(err.message);
      }
    }

    function copyAccount() {
      if (!current || !current.account) return;

      navigator.clipboard.writeText(current.account)
        .then(() => alert('已複製'))
        .catch(() => alert(current.account));
    }

    /* ================= UTIL ================= */

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>

</html>
