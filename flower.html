<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拜拜花</title>
  <style>
    :root {
      --bg: #f5f6f3;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #2563eb;
      --brand2: #eff6ff;
      --good: #059669;
      --good2: #ecfdf5;
      --bad: #dc2626;
      --bad2: #fef2f2;
      --warn: #d97706;
      --warn2: #fffbeb;
      --radius: 18px;
      --shadow: 0 10px 26px rgba(15, 23, 42, .07);
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      color: var(--ink)
    }

    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px
    }

    h1 {
      font-size: 28px;
      margin: 0
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px
    }

    .kpi {
      background: white;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px;
      min-height: 84px
    }

    .kpi .label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800
    }

    .kpi .n {
      font-size: 28px;
      font-weight: 950;
      margin-top: 6px
    }

    .toolbar {
      display: grid;
      grid-template-columns: 2fr .9fr .9fr .9fr auto auto auto;
      gap: 8px;
      align-items: center
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 11px 12px;
      font-size: 15px;
      background: #fff;
      color: var(--ink)
    }

    textarea {
      min-height: 76px;
      resize: vertical
    }

    button {
      border: 0;
      border-radius: 13px;
      padding: 11px 14px;
      font-size: 15px;
      font-weight: 900;
      background: #111827;
      color: #fff;
      cursor: pointer;
      white-space: nowrap
    }

    button.light {
      background: white;
      color: #111827;
      border: 1px solid var(--line)
    }

    button.blue {
      background: var(--brand)
    }

    button.danger {
      background: var(--bad)
    }

    button.small {
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 10px
    }

    .quick {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px
    }

    .quick button {
      background: #fff;
      color: #111827;
      border: 1px solid var(--line)
    }

    .quick button.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand)
    }

    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap
    }

    .ok {
      background: var(--good2);
      color: var(--good)
    }

    .warn {
      background: var(--warn2);
      color: var(--warn)
    }

    .bad {
      background: var(--bad2);
      color: var(--bad)
    }

    .info {
      background: var(--brand2);
      color: var(--brand)
    }

    .gray {
      background: #f3f4f6;
      color: #4b5563
    }

    .tablewrap {
      height: calc(100vh - 270px);
      min-height: 520px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 10px 9px;
      vertical-align: top;
      font-size: 14px
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      color: #475569;
      font-size: 13px;
      z-index: 2
    }

    tr:hover td {
      background: #fafafa
    }

    td.name {
      min-width: 138px
    }

    td.area {
      min-width: 140px
    }

    td.card {
      min-width: 220px;
      white-space: pre-line
    }

    td.sponge {
      min-width: 100px;
      white-space: nowrap;
    }

    td.note {
      min-width: 220px;
      white-space: pre-line
    }

    td.actions {
      min-width: 125px
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45
    }

    .summaryline {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin: 8px 0 0;
      color: #475569;
      font-size: 14px
    }

    .drawer {
      display: none;
      position: fixed;
      right: 18px;
      top: 18px;
      bottom: 18px;
      width: min(520px, calc(100vw - 36px));
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, .22);
      z-index: 10;
      overflow: auto;
      padding: 18px
    }

    .drawer.show {
      display: block
    }

    .drawerHead {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px
    }

    .drawer h2 {
      margin: 0;
      font-size: 22px
    }

    .form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .full {
      grid-column: 1/-1
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 900;
      color: #4b5563;
      margin-bottom: 6px
    }

    .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }

    .choice {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
      cursor: pointer
    }

    .choice input {
      width: auto;
      margin-right: 6px
    }

    .choice:has(input:checked) {
      background: var(--brand2);
      border-color: #60a5fa
    }

    .preview {
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 12px;
      line-height: 1.65;
      font-size: 14px
    }

    .datechips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px
    }

    .datechip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 12px
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #111827;
      color: #fff;
      border-radius: 14px;
      padding: 12px 16px;
      display: none;
      box-shadow: var(--shadow);
      z-index: 20000;
    }

    .toast.show {
      display: block
    }

    .mobileCards {
      display: none
    }

    .carditem {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      padding: 12px;
      margin-bottom: 10px
    }

    .cardTop {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start
    }

    .cardTitle {
      font-weight: 950;
      font-size: 17px
    }

    .cardFields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
      font-size: 13px
    }

    .field {
      background: #f8fafc;
      border-radius: 12px;
      padding: 8px
    }

    .statsGrid {
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 12px
    }

    .statBox {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 12px
    }

    .statBox h3 {
      margin: 0 0 10px;
      font-size: 16px
    }

    .statTable {
      width: 100%;
      border-collapse: collapse
    }

    .statTable th,
    .statTable td {
      padding: 8px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      text-align: right
    }

    .statTable th:first-child,
    .statTable td:first-child {
      text-align: left
    }

    .areaStats {
      margin-top: 12px
    }

    .noticeRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      width: 100%;
    }

    .noticeBar {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 16px;
      padding: 8px 12px;
      cursor: pointer;
      overflow: hidden;
      white-space: nowrap;
      width: 100%;
      max-width: none;
    }

    .nextLunarBox {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      border-radius: 16px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .noticeTrack {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 18s linear infinite;
      font-weight: 900;
    }

    .loadingMask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.82);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .loadingMask.show {
      display: flex;
    }

    .loadingBox {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .loadingBox img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    @keyframes marquee {
      from {
        transform: translateX(0)
      }

      to {
        transform: translateX(-100%)
      }
    }

    @media(max-width:900px) {
      .statsGrid {
        grid-template-columns: 1fr
      }
    }

    @media(max-width:1180px) {
      .kpis {
        grid-template-columns: repeat(3, 1fr)
      }

      .toolbar {
        grid-template-columns: 1fr 1fr 1fr
      }
    }

    @media(max-width:760px) {
      .noticeRow {
        grid-template-columns: 1fr;
      }

      .nextLunarBox {
        width: 100%;
        overflow-x: auto;
        white-space: nowrap;
      }

      .noticeBar {
        width: 100%;
      }

      .wrap {
        padding: 12px
      }

      h1 {
        font-size: 23px
      }

      .top {
        flex-direction: column
      }

      .kpis {
        grid-template-columns: repeat(2, 1fr)
      }

      .toolbar {
        grid-template-columns: 1fr
      }

      .tablewrap {
        display: none
      }

      .mobileCards {
        display: block
      }

      .form {
        grid-template-columns: 1fr
      }

      .drawer {
        right: 10px;
        left: 10px;
        top: 10px;
        bottom: 10px;
        width: auto
      }
    }

    @media(max-width:900px) {
      .noticeRow {
        grid-template-columns: 1fr;
      }

      .nextLunarBox {
        width: 100%;
        overflow-x: auto;
        white-space: nowrap;
      }

      .noticeBar {
        width: 100%;
      }
    }

    @media print {

      .top,
      .kpis,
      .toolbar,
      .quick,
      .drawer,
      .toast,
      button {
        display: none !important
      }

      .wrap {
        max-width: none;
        padding: 0
      }

      .panel {
        box-shadow: none;
        border: 0;
        padding: 0
      }

      .tablewrap {
        height: auto;
        overflow: visible;
        border: 0
      }

      th {
        position: static
      }

      td,
      th {
        font-size: 11px;
        padding: 5px
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>拜拜花</h1>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="blue" onclick="openDrawer('add')">＋ 新增客戶</button>
        <!-- <button class="light" onclick="window.print()" style="display:none">列印目前清單</button>
        <button class="light" onclick="exportCsv()" style="display:none">匯出 CSV</button> -->
      </div>
    </div>
    <div class="noticeRow">
      <div class="noticeBar" onclick="editNotice()">
        <span id="noticeText" class="noticeTrack"></span>
      </div>
      <div id="nextLunarBox" class="nextLunarBox"></div>
    </div>
    <section class="panel">
      <div id="statsArea"></div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="q" placeholder="直接搜尋：客戶、地區、卡片、備註、日期..." oninput="render()" />
        <select id="cycleFilter" onchange="render()">
          <option value="">全部規則</option>
          <option value="初一">初一</option>
          <option value="初十五">初十五</option>
          <option value="初二">初二</option>
          <option value="特殊">特殊</option>
        </select>
        <select id="areaFilter" onchange="render()">
          <option value="">全部地區</option>
        </select>
        <select id="statusFilter" onchange="render()">
          <option value="">全部</option>
          <option value="soon">快到期</option>
          <option value="expired">已過期</option>
          <option value="photo">需拍照 / 注意事項</option>
        </select>
        <button class="light" onclick="clearFilters()">清除過濾</button>
        <button id="densityBtn" class="light" onclick="toggleDensity()">中</button>
      </div>
      <div class="summaryline">
        <div id="countText"></div>
        <div id="sumText"></div>
      </div>
    </section>

    <section class="tablewrap">
      <table id="orderTable">
        <thead>
          <tr>
            <th>客戶</th>
            <th>地區</th>
            <th>卡片下款</th>
            <th>花量</th>
            <th>卡片</th>
            <th>海綿</th>
            <th>規則</th>
            <th>最後到期</th>
            <th>注意事項</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
    <section id="mobileCards" class="mobileCards"></section>
  </div>

  <aside id="drawer" class="drawer">
    <div class="drawerHead">
      <div>
        <h2 id="drawerTitle">新增客戶</h2>
        <div class="muted" id="drawerHint">填完後會直接加到首頁清單。</div>
      </div>
      <button class="light" onclick="closeDrawer()">關閉</button>
    </div>

    <div class="form">
      <input type="hidden" id="editId" />
      <div><label>客戶名字</label><input id="fName" placeholder="例如：王小明"></div>
      <div><label>地區</label><input id="fArea" list="areaOptions" placeholder="例如：土地公"><datalist
          id="areaOptions"></datalist></div>
      <div class="full"><label>卡片下款</label><textarea id="fCard"></textarea></div>
      <div><label>供花單位</label>
        <div class="seg"><label class="choice"><input type="radio" name="unit" value="盆" checked
              onchange="preview()">盆</label><label class="choice"><input type="radio" name="unit" value="對"
              onchange="preview()">對</label></div>
      </div>
      <div><label>數量</label><input id="fQty" type="number" min="1" value="1" oninput="preview()"></div>
      <div><label>海綿</label><select id="fSponge" onchange="preview()">
          <option>1/3 長海綿</option>
          <option selected>1/2 海綿</option>
          <option>花束</option>
        </select></div>
      <div><label>卡片數量</label><input id="fCards" type="number" min="0" value="1"></div>
      <div><label>供花規則</label><select id="fCycle" onchange="preview()">
          <option value="初一初十五">農曆初一 + 初十五</option>
          <option value="初一">農曆初一</option>
          <option value="初二">農曆初二（加在初一總數）</option>
          <option value="初十五">農曆初十五</option>
        </select></div>
      <div><label>購買次數</label><input id="fTimes" type="number" min="1" value="12" oninput="preview()"></div>
      <div><label>開始供花日（國曆）</label><input id="fStart" type="date" value="2026-05-01" onchange="preview()"></div>
      <div class="full"><label>注意事項</label><textarea id="fNote" placeholder="例如：送完拍照、月結、LINE 名稱"></textarea></div>
      <div class="full"><label>自動計算結果</label>
        <div id="calcPreview" class="preview"></div>
      </div>
      <div class="full" style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="blue" onclick="saveForm()">儲存</button>
        <button class="light" onclick="closeDrawer()">取消</button>
        <button id="deleteBtn" class="danger" onclick="deleteCurrent()" style="display:none">刪除這筆</button>
      </div>
    </div>
  </aside>

  <div id="toast" class="toast"></div>
  <div id="loadingMask" class="loadingMask">
    <div class="loadingBox" id="loadingBox"></div>
  </div>
  <script>
    let orders = [];

      }
    }

    function calcStats(list) {
      const today = todayDate();
      const month = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;

      const thisMonthEvents = LUNAR_EVENTS.filter(e =>
        e.date.startsWith(month) &&
        ['初一', '初二', '初十五'].includes(e.type)
      );

      const base = {
        firstPot: 0,
        firstPair: 0,
        fifteenPot: 0,
        fifteenPair: 0,
        firstSponge13: 0,
        firstSponge12: 0,
        firstBouquet: 0,
        fifteenSponge13: 0,
        fifteenSponge12: 0,
        fifteenBouquet: 0,
        areas: {}
      };

      function addArea(area) {
        if (!base.areas[area]) {
          base.areas[area] = {
            firstPot: 0,
            firstPair: 0,
            fifteenPot: 0,
            fifteenPair: 0
          };
        }
        return base.areas[area];
      }

      function matchCycle(o, eventType) {
        if (eventType === '初一') {
          return o.cycle === '初一' || o.cycle === '初一初十五';
        }

        if (eventType === '初二') {
          return o.cycle === '初二';
        }

        if (eventType === '初十五') {
          return o.cycle === '初十五' || o.cycle === '初一初十五';
        }

        return false;
      }

      thisMonthEvents.forEach(e => {
        list.forEach(o => {
          if (!matchCycle(o, e.type)) return;
          if (!isActiveOnDate(o, e.date)) return;

          const pot = toNumber(o.pot);
          const pair = toNumber(o.pair);
          const actualPots = pot + pair * 2;
          const sponge = o.sponge || '1/2 海綿';
          const area = addArea(o.area || '未分類');

          if (e.type === '初一' || e.type === '初二') {
            base.firstPot += pot;
            base.firstPair += pair;
            area.firstPot += pot;
            area.firstPair += pair;
            addSpongeCount(base, 'first', sponge, actualPots);
          }

          if (e.type === '初十五') {
            base.fifteenPot += pot;
            base.fifteenPair += pair;
            area.fifteenPot += pot;
            area.fifteenPair += pair;
            addSpongeCount(base, 'fifteen', sponge, actualPots);
          }
        });
      });

      return base;
    }
    function renderStats() {
      const s = calcStats(orders);
      const areaRows = Object.entries(s.areas)
        .sort((a, b) => a[0].localeCompare(b[0], 'zh-Hant'))
        .map(([area, x]) => `
    <tr>
      <td>${esc(area)}</td>
      <td>${x.firstPot}</td>
      <td>${x.firstPair}</td>
      <td>${x.fifteenPot}</td>
      <td>${x.fifteenPair}</td>
    </tr>
  `).join('');

      $('statsArea').innerHTML = `
    <div class="statsGrid">
      <div class="statBox">
        <h3>全區總數（初一）</h3>
        <table class="statTable">
          <tr><th>項目</th><th>數量</th></tr>
          <tr><td>盆</td><td>${s.firstPot}</td></tr>
          <tr><td>對</td><td>${s.firstPair}</td></tr>
        </table>
      </div>

      <div class="statBox">
        <h3>全區總數（初十五）</h3>
        <table class="statTable">
          <tr><th>項目</th><th>數量</th></tr>
          <tr><td>盆</td><td>${s.fifteenPot}</td></tr>
          <tr><td>對</td><td>${s.fifteenPair}</td></tr>
        </table>
      </div>

      <div class="statBox">
        <h3>海綿數量</h3>
        <table class="statTable">
<tr><th></th><th>1/3長海綿</th><th>1/2海綿</th><th>花束</th></tr>
<tr><td>初一</td><td>${s.firstSponge13}</td><td>${s.firstSponge12}</td><td>${s.firstBouquet}</td></tr>
<tr><td>初十五</td><td>${s.fifteenSponge13}</td><td>${s.fifteenSponge12}</td><td>${s.fifteenBouquet}</td></tr>
        </table>
      </div>
    </div>

    <div class="statBox areaStats">
      <h3>區域加總</h3>
      <table class="statTable">
        <tr>
          <th>區域</th>
          <th>初一盆</th>
          <th>初一對</th>
          <th>初十五(盆)</th>
          <th>初十五(對)</th>
        </tr>
        ${areaRows}
      </table>
    </div>
  `;
    }

    function renderTable(rows) {
      $('tbody').innerHTML = rows.map(o => `<tr>
    <td class="name"><b>${esc(o.name)}</b></td>
    <td class="area">${esc(o.area)}</td>
    <td class="card">${esc(o.card)}</td>
<td>${o.qty || 0}${o.unit || ''}</td>
<td>${o.cards || 0}張</td>
<td class="sponge">${esc(o.sponge || '未設定')}</td>
    <td><span class="badge info">${cycleText(o.cycle)}</span></td>
<td>${esc(o.endDate || o.due || '-')}</td>
    <td class="note">${esc(o.note || '')}</td>
    <td class="actions"><button class="small light" onclick="openDrawer('edit','${esc(o.id)}')">修改</button></td>
  </tr>`).join('');
      const densityConfig = {
        large: { padding: '14px 12px', fontSize: '16px' },
        middle: { padding: '10px 9px', fontSize: '14px' },
        small: { padding: '6px 7px', fontSize: '12px' }
      };

      document.querySelectorAll('#orderTable td,#orderTable th').forEach(el => {
        el.style.padding = densityConfig[density].padding;
        el.style.fontSize = densityConfig[density].fontSize;
      });
    }
    function renderMobile(rows) {
      $('mobileCards').innerHTML = rows.map(o => `<div class="carditem">
    <div class="cardTop"><div><div class="cardTitle">${esc(o.name)}</div><div class="muted">${esc(o.area)}</div></div></div>
    <div class="cardFields">
<div class="field"><b>花量</b><br>${o.qty || 0}${o.unit || ''}</div>
<div class="field"><b>卡片</b><br>${o.cards || 0}張</div>
      <div class="field"><b>規則</b><br>${cycleText(o.cycle)}</div>
      <div class="field"><b>到期</b><br>${esc(o.endDate || o.due || '-')}</div>
      <div class="field"><b>海綿</b><br>${esc(o.sponge || '未設定')}</div>
    </div>
    <div class="field" style="margin-top:8px"><b>卡片</b><br>${esc(o.card)}</div>
    <div class="field" style="margin-top:8px"><b>備註</b><br>${esc(o.note || '')}</div>
    <div style="margin-top:8px"><button class="small light" onclick="openDrawer('edit','${esc(o.id)}')">修改</button></div>
  </div>`).join('');
    }
    function clearFilters() {
      $('q').value = '';
      $('cycleFilter').value = '';
      $('areaFilter').value = '';
      $('statusFilter').value = '';
      render();
    }
    function toggleDensity() {
      const order = ['large', 'middle', 'small'];
      const text = {
        large: '大',
        middle: '中',
        small: '小'
      };

      const nextIndex = (order.indexOf(density) + 1) % order.length;
      density = order[nextIndex];

      $('densityBtn').textContent = text[density];
      render();
      toast(`已切換成${text[density]}字模式`);
    }
    function preview() {
      const start = $('fStart').value, cycle = $('fCycle').value, times = +$('fTimes').value || 0, qty = +$('fQty').value || 0;
      const unit = document.querySelector('input[name="unit"]:checked').value, sponge = $('fSponge').value;
      const dates = start && times ? matchedDates(start, cycle, times) : [];
      const potUnit = unit === '對' ? qty * 2 : qty, end = dates.length ? dates[dates.length - 1] : null;

      $('calcPreview').innerHTML = `<b>每次供花：</b>${qty}${unit}，實際盆量 ${potUnit}，${sponge} ${potUnit} 個<br>
  <b>規則：</b>${cycleText(cycle)}｜<b>購買：</b>${times} 次<br>
  <b>最後一次供花：</b>${end ? end.date + '（' + end.label + '）' : '尚未可計算'}
  <div class="datechips">
    ${dates.map((d, i) => `<span class="datechip">${i + 1}. ${d.date} ${d.label}</span>`).join('')}
  </div>`;
    }
    function openDrawer(mode, id) {
      $('drawer').classList.add('show');
      $('deleteBtn').style.display = mode === 'edit' ? 'inline-block' : 'none';
      if (mode === 'add') {
        $('drawerTitle').textContent = '新增客戶';
        $('drawerHint').textContent = '填完後會直接加到首頁清單。';
        $('editId').value = '';
        ['fName', 'fArea', 'fCard', 'fNote'].forEach(x => $(x).value = '');
        $('fQty').value = 1;
        $('fCards').value = 1;
        $('fTimes').value = 2;
        $('fStart').value = todayText();
        $('fCycle').value = '初一初十五';
        $('fSponge').value = '1/2 海綿';
        document.querySelector('input[name="unit"][value="盆"]').checked = true;
      } else {
        const o = orders.find(x => String(x.id) === String(id));
        if (!o) {
          toast('找不到這筆資料，請重新整理');
          return;
        }
        $('drawerTitle').textContent = '修改客戶';
        $('editId').value = o.id; $('fName').value = o.name || ''; $('fArea').value = o.area || ''; $('fCard').value = o.card || ''; $('fNote').value = o.note || '';
        $('fQty').value = o.qty || 1; $('fCards').value = o.cards || 0; $('fTimes').value = o.times || 12; $('fStart').value = o.startDate || todayText(); $('fCycle').value = ['初一初十五', '初一', '初二', '初十五'].includes(o.cycle) ? o.cycle : '初一初十五'; $('fSponge').value = o.sponge || '1/2 海綿';
        document.querySelector(`input[name="unit"][value="${o.unit || '盆'}"]`).checked = true;
      }
      preview();
    }
    function closeDrawer() { $('drawer').classList.remove('show') }
    async function saveForm() {
      if (saving) return;
      saving = true;
      const name = $('fName').value.trim();
      const area = $('fArea').value.trim();
      const card = $('fCard').value.trim();
      const start = $('fStart').value;
      const cycle = $('fCycle').value;
      const times = +$('fTimes').value || 0;
      const qty = +$('fQty').value || 0;
      const unit = document.querySelector('input[name="unit"]:checked').value;

      if (!name || !area || !start || !times || !qty) {
        toast('客戶、地區、開始日、次數、數量都要填');
        saving = false;
        return;
      }

      const dates = matchedDates(start, cycle, times);

      if (dates.length < times) {
        toast('農曆資料不足，無法算完這麼多次');
        saving = false;
        return;
      }

      let note = $('fNote').value.trim();

      if (cycle === '初二' && !note.includes('初二')) {
        note = (note ? note + '；' : '') + '初二才送';
      }

      const id = $('editId').value;

      const obj = {
        id,
        area,
        name,
        card,
        unit,
        qty,
        pot: unit === '盆' ? qty : 0,
        pair: unit === '對' ? qty : 0,
        cards: +$('fCards').value || 0,
        note,
        cycle,
        sponge: $('fSponge').value,
        times,
        startDate: start,
        endDate: dates[dates.length - 1].date,
        due: dates[dates.length - 1].date
      };

      try {
        setLoading(true);
        toast('儲存中...');
        const json = await api('saveOrder', frontOrderToGas(obj));
        if (!json.ok) throw new Error(json.message || '儲存失敗');
        await loadData();
        closeDrawer();
        toast('已儲存');
      } catch (err) {
        console.error(err);
        toast('儲存失敗：' + err.message);
      } finally {
        saving = false;
        setLoading(false);
      }
    }
    async function deleteCurrent() {
      if (deleting) return;

      const id = $('editId').value;
      if (!id) return;

      if (!confirm('確定刪除這筆？')) return;

      deleting = true;

      try {
        setLoading(true);
        toast('刪除中...');
        const json = await api('deleteOrder', { id });

        if (!json.ok) throw new Error(json.message || '刪除失敗');

        await loadData();
        closeDrawer();
        toast('已刪除');
      } catch (err) {
        console.error(err);
        toast('刪除失敗：' + err.message);
      } finally {
        deleting = false;
        setLoading(false);
      }
    }

    function toast(t) { $('toast').textContent = t; $('toast').classList.add('show'); setTimeout(() => $('toast').classList.remove('show'), 2200) }
    function setLoading(show) {
      const hasImage = $('loadingBox').querySelector('img');
      $('loadingMask').classList.toggle('show', !!show && !!hasImage);
    }
    function setupOptions() {
      const areas = [...new Set(orders.map(o => o.area).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-Hant'));
      $('areaFilter').innerHTML = '<option value="">全部地區</option>' + areas.map(a => `<option>${esc(a)}</option>`).join('');
      $('areaOptions').innerHTML = areas.map(a => `<option value="${esc(a)}"></option>`).join('');
    }
    loadData();
  </script>
</body>
