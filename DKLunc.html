<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布二專屬點餐系統</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
        integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
        crossorigin="anonymous"></script>
    <style>
        .All {
            width: 100%;
            display: flex;
            position: absolute;
        }

        .List {
            width: 70%;
            height: 100%;
        }

        .white {
            width: 0px;
        }

        .FormArea {
            width: 30%;
            height: 1px;
            position: sticky;
            top: 1px;
            padding: 50px 0px 0px 10px;
        }

        .table {
            text-align: center;
            font-size: 80%;
        }

        #exampleFormControlInput1 {
            width: 90%;
        }

        button {
            border-color: rgb(204, 204, 204);
            color: black;
        }

        .btn {
            margin: 1px;
            width: 30%;
            height: 20%;
            font-size: 90%;
        }

        .FormArea p {
            color: red;
            font-size: 5%;
            font-weight: bolder;
        }

        .Stop {
            width: auto;
            height: 30%;
            position: absolute;
            right: 0px;
            top: 5000px;
            font-size: 300%;
        }
    </style>
</head>

<body>
    <div class="All">
        <div class="List">
            <table class="table">
                <thead>
                    <tr class="table-danger">
                        <td><strong>姓名</strong></td>
                        <td><strong>午餐</strong></td>
                        <td><strong>飲料</strong></td>
                        <td><strong>甜度</strong></td>
                        <td><strong>冰塊</strong></td>
                        <td><strong>訂餐時間</strong></td>
                    </tr>
                </thead>
                <tbody class="ListTbody">
                </tbody>
                <tfoot class="ListTotal">
                </tfoot>
            </table>
        </div>
        <div class="white"></div>
        <div class="FormArea">
            <form id="saveForm" method="post" action=Link onsubmit="return false">
                <input name="name" class="form-control" id="exampleFormControlInput1" placeholder="姓名"
                    required="required">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="lunchSwitchCheck"
                        name="wantLunch">
                    <label class="form-check-label" for="lunchSwitchCheck" id="lunch">我不要點午餐</label>
                </div>
                <div class="drink form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="drinkSwitchCheck"
                        name="wantDrink">
                    <label class="form-check-label" for="drinkSwitchCheck" id="drink">我不要點飲料</label>
                </div>
                <div class="SugarDiv" style="display: none;">
                    <input type="radio" class="Sugar btn-check" name="Sugar" id="noSugar" value="無糖" autocomplete="off">
                    <label class="btn align-middle btn-outline-success" for="noSugar">無糖</label>

                    <input type="radio" class="Sugar btn-check" name="Sugar" id="lightSugar" value="微糖"
                        autocomplete="off">
                    <label class="btn align-middle btn-outline-success" for="lightSugar">微糖</label>

                    <input type="radio" class="Sugar btn-check" name="Sugar" id="halfSugar" value="半糖"
                        autocomplete="off">
                    <label class="btn align-middle btn-outline-success" for="halfSugar">半糖</label>

                    <input type="radio" class="Sugar btn-check" name="Sugar" id="lessSugar" value="少糖"
                        autocomplete="off">
                    <label class="btn align-middle btn-outline-success" for="lessSugar">少糖</label>

                    <input type="radio" class="Sugar btn-check" name="Sugar" id="standard" value="全糖"
                        autocomplete="off">
                    <label class="btn align-middle btn-outline-success" for="standard">全糖</label>
                </div>
                <div class="IceDiv" style="display: none;">
                    <input type="radio" class="Ice btn-check" name="Ice" id="noIce" value="去冰" autocomplete="off">
                    <label class="btn align-middle btn-outline-primary" for="noIce">去冰</label>

                    <input type="radio" class="Ice btn-check" name="Ice" id="lightIce" value="微冰" autocomplete="off">
                    <label class="btn align-middle btn-outline-primary" for="lightIce">微冰</label>

                    <input type="radio" class="Ice btn-check" name="Ice" id="normal" value="正常" autocomplete="off">
                    <label class="btn align-middle btn-outline-primary" for="normal">正常</label>

                    <input type="radio" class="Ice btn-check" name="Ice" id="warm" value="溫" autocomplete="off">
                    <label class="btn align-middle btn-outline-primary" for="warm">溫</label>

                    <input type="radio" class="Ice btn-check" name="Ice" id="hot" value="熱" autocomplete="off">
                    <label class="btn align-middle btn-outline-primary" for="hot">熱</label>
                </div>
                <button class="Order" onclick="writeIn()">確認送出</button>
                <input type="text" name="Phone" id="Phone" style="display: none;">
                <input type="text" name="mission" value="Write" style="display: none;">
            </form>
        </div>
    </div>
    <button class="Stop" onclick="StopOrder()">停止訂餐(再按一次恢復)</button>


    <script>
        var Link = "https://script.google.com/macros/s/AKfycbynt19HRQc8bnY5NNyG3lMDs8rXOw2HnLGoXE_Vynln7pjTDI6Ntca60M7GXxtLedOs/exec";
        window.onload = function () {
            var browser = {
                versions: function () {
                    var u = navigator.userAgent, app = navigator.appVersion;
                    return {
                        mobile: !!u.match(/AppleWebKit.*Mobile.*/), //是否為移動終端
                        ios: !!u.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/), //ios終端
                        android: u.indexOf("Android") > -1 || u.indexOf("Linux") > -1, //android終端或者uc瀏覽器
                    };
                }(),
                language: (navigator.browserLanguage || navigator.language).toLowerCase()
            }
            if (browser.versions.ios) { document.querySelector('#Phone').value = "IPhone"; }
            else if (browser.versions.android) { document.querySelector('#Phone').value = "Android"; }
            else { document.querySelector('#Phone').value = "unknow" }
            // alert(" ios終端: " + browser.versions.mobile);
            // alert(" android終端: " + browser.versions.ios);
            // alert(" 蘋果、谷歌核心: " + browser.versions.android);
            // alert(navigator.userAgent);
            $.ajax({
                type: "POST",
                dataType: 'json',
                url: Link,
                data: {
                    mission: 'Read'
                },
                success: function (result) {
                    makeTable(result)
                }
            });
        }
        function makeTable(result) {
            let eatTotal = 0;
            let drinkTotal = 0;
            let tableFoot = `<tr><td></td><td>`;
            let tableDom = '';
            for (var i = 1; i < result.length; i++) {
                if (i % 2 === 0) {
                    tableDom = tableDom + `<tr class="table-warning">`;
                }
                else { tableDom = tableDom + `<tr class="table-info">`; }
                for (let j = 0; j < 6; j++) {
                    tableDom = tableDom + `<td>  <strong>${result[i][j]}</strong></td>`;
                    if (j == 1 && result[i][j] == 'O') { eatTotal = eatTotal + 1; }
                    if (j == 2 && result[i][j] == 'O') { drinkTotal = drinkTotal + 1; }
                }
                tableDom = tableDom + "</tr>";
            }
            tableFoot = tableFoot + `${eatTotal}份</td><td>${drinkTotal}杯</td><td></td><td></td><td></td>`;
            $('.ListTbody').html(tableDom);
            $('.ListTotal').html(tableFoot);
            if (result[0][5] == "True") {
                document.querySelector('.Order').innerHTML = '已過訂餐時間'
                document.querySelector('.Order').disabled = true;
            }
        }
        document.querySelector('#lunchSwitchCheck').addEventListener("change", function () {
            if (document.querySelector('#lunchSwitchCheck').checked) {

                document.querySelector('#lunch').innerHTML = '我要點午餐';
            }
            else { document.querySelector('#lunch').innerHTML = '我不要點午餐'; }
        });
        document.querySelector('#drinkSwitchCheck').addEventListener("change", function () {
            if (document.querySelector('#drinkSwitchCheck').checked) {

                document.querySelector('#drink').innerHTML = '我要點飲料';
                document.querySelector('.SugarDiv').style.display = 'block'
                document.querySelector('.IceDiv').style.display = 'block'
            }
            else {
                document.querySelector('#drink').innerHTML = '我不要點飲料';
                document.querySelector('.SugarDiv').style.display = 'none';
                document.querySelector('.IceDiv').style.display = 'none'
                document.querySelectorAll('.Sugar').forEach(function (e) {
                    e.checked = false;
                })
                document.querySelectorAll('.Ice').forEach(function (e) {
                    e.checked = false;
                })
            }
        });
        function writeIn() {
            if (exampleFormControlInput1.value == "") { alert("輸入姓名"); }
            else {
                $.ajax({
                    type: "POST",
                    dataType: 'json',
                    url: Link,
                    data: $('#saveForm').serialize(),
                    success: function () {
                        alert("點餐成功!");
                        window.location.href = 'https://kai6-6-6.github.io/DKLunch.html';
                        // window.location.href = 'http://127.0.0.1:5500/DKLunch.html';
                        // window.location.href = 'https://kai6-6-6.github.io/DKLunch.html';
                    },
                    error: function () {
                        // alert("點餐失敗!");
                        window.location.href = 'https://kai6-6-6.github.io/DKLunch.html';
                    }
                });
            }
        }
        function StopOrder() {
            $.ajax({
                type: "POST",
                dataType: 'json',
                url: Link,
                data: {
                    mission: 'Stop'
                },
                success: function () {
                    window.location.href = 'https://kai6-6-6.github.io/DKLunch.html';
                },
                error: function () {
                    window.location.href = 'https://kai6-6-6.github.io/DKLunch.html';
                }
            });
        }
    </script>
</body>

</html>
