<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明聖宮-點燈名單</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
        integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
        crossorigin="anonymous"></script>
    <style>
        .name li {
            list-style-type: none;
            margin-top: 5px;
        }

        input {
            width: 25%;
            font-size: 30px;
        }

        .searchName {
            border: solid;
            border-width: thin;
        }

        .address {
            width: 75%;
        }

        .year,
        .month,
        .day {
            width: 80px;
        }

        div.loadingdiv {
            height: 100%;
            width: 100%;
            /*100%覆蓋網頁內容, 避免user在loading時進行其他操作*/
            position: fixed;
            z-index: 99999;
            /*須大於網頁內容*/
            top: 0;
            left: 0;
            display: block;
            background: rgb(207, 207, 207);
            opacity: 1.0;
            text-align: center;
        }

        div.loadingdiv img {
            position: relative;
            vertical-align: middle;
            text-align: center;
            margin: 0 auto;
            margin-top: -100px;
            width: 75%;
        }

        button {
            font-size: 20px;
        }

        .light1,
        .light2,
        .light3 {
            width: 50px;
        }

        label {
            padding: 0;
            margin-right: 8px;
            cursor: pointer;
        }

        input[type=checkbox] {
            display: none;
        }

        input[type=checkbox]+span {
            display: inline-block;
            background-color: #aaa;
            padding: 3px 6px;
            border: 1px solid gray;
            color: #444;
            user-select: none;
            /* 防止文字被滑鼠選取反白 */
        }

        input[type=checkbox]:checked+span {
            color: LemonChiffon;
            background-color: Gold;
        }
    </style>
</head>

<body>
    <input type="search" class="searchName" placeholder="姓名" value="">
    <input class="age" placeholder="年齡" value="">
    <input type="number" class="year" placeholder="民國" value=""><strong style="font-size: 20px;">年</strong>
    <input type="number" class="month" placeholder="月" value=""><strong style="font-size: 20px;">月</strong>
    <input type="number" class="day" placeholder="日" value=""><strong style="font-size: 20px;">日</strong>
    <br>
    <input class="address" placeholder="地址" value="">
    <br>
    <label>
        <input type="checkbox" class="light1" value="安太歲" />
        <span style="font-size: 20px;">安太歲</span>
    </label>
    <label>
        <input type="checkbox" class="light2" value="光明燈" />
        <span style="font-size: 20px;">光明燈</span>
    </label>
    <label>
        <input type="checkbox" class="light3" value="財利燈" />
        <span style="font-size: 20px;">財利燈</span>
    </label>
    <button onclick="addToJoin()">加入</button>
    <ul class="name"></ul>
    <table class="table">
        <thead>
            <tr class="table-primary">
                <td colspan="3" class="PrintLink"></td>
                <td><button onclick="MakeExcel()">製作檔案</button></td>
            </tr>
            <tr class="table-danger">
                <td><strong style="font-size: 20px;">姓名</strong></td>
                <td style="width: 90px;"><strong style="font-size: 20px;">安太歲</strong></td>
                <td style="width: 90px;"><strong style="font-size: 20px;">光明燈</strong></td>
                <td style="width: 120px;"><strong style="font-size: 20px;">財利燈</strong></td>
                <td><strong style="font-size: 20px;">年齡</strong></td>
                <td><strong style="font-size: 20px;">生日</strong></td>
                <td><strong style="font-size: 20px;">地址</strong></td>
            </tr>
        </thead>
        <tbody class="ListTbody"></tbody>
    </table>

    <div class="loadingdiv" id="loading" style="display: none">
        <img id="Gif" src="1.gif" />
    </div>

    <script>
    const GAS_API = "https://script.google.com/macros/s/AKfycby8rFqirSgDu7_VqKcjXKuYi7DeL1GPTiFsZCJuirlAfGypEiFX3Ov0pILWIHBtLJg15Q/exec";
    let MembersInfo = [];
    let JoinMembers = [];
    const LoadingGif = ["1.gif", "2.gif", "3.gif", "4.gif", "5.gif", "6.gif", "7.gif", "8.gif", "9.gif", "10.gif", "11.gif", "12.gif"];

    $(document).ready(function () {
        initializePage();
    });

    function initializePage() {
        setupDateInputRestrictions();
        fetchDataFromGAS();
        setupSearchListener();
    }

    function setupDateInputRestrictions() {
        $(".year, .month, .day").on("change keyup", function () {
            const val = $(this).val();
            if ((this.className === "year" && val < 1) || 
                (this.className === "month" && (val < 1 || val > 12)) || 
                (this.className === "day" && (val < 1 || val > 31))) {
                $(this).val("");
            }
        });
    }

    function fetchDataFromGAS() {
        showLoading(true);
        $.post(GAS_API, { mission: 'GetAllMembers', members: "" })
            .done(processMembersData)
            .always(() => showLoading(false));
    }

    function processMembersData(result) {
        const results = result.split(',');
        MembersInfo = [];
        for (let i = 0; i < results.length; i += 4) {
            const member = results.slice(i, i + 4);
            MembersInfo.push(member);
            appendMemberToList(member, i / 4);
        }
    }

    function appendMemberToList(member, index) {
        const $li = $(`<li style="font-size: 20px;" id="li${index}">${member.join(' - ')}</li>`);
        $li.hide().on('click', () => pickOne(member)).appendTo(".name");
    }

    function setupSearchListener() {
        $('.searchName').on('input', function () {
            const searchValue = $(this).val().toLowerCase();
            $(".name li").each(function (index) {
                const isVisible = MembersInfo[index][0].toLowerCase().includes(searchValue);
                $(this).toggle(isVisible);
            });
        });
    }

    function pickOne(member) {
        $('.searchName').val(member[0]);
        $('.age').val(member[1]);
        if (member[2]) {
            const [year, month, day] = member[2].split('/');
            $('.year').val(year).change();
            $('.month').val(month).change();
            $('.day').val(day).change();
        }
        $('.address').val(member[3]);
        $(".name li").hide();
    }

    function addToJoin() {
        const name = $('.searchName').val();
        if (name) {
            const member = {
                name: name,
                light1: $('.light1').is(':checked') ? 1 : 0,
                light2: $('.light2').is(':checked') ? 1 : 0,
                light3: $('.light3').is(':checked') ? 1 : 0,
                age: $('.age').val(),
                birthDate: `${$('.year').val()}/${$('.month').val()}/${$('.day').val()}`,
                address: $('.address').val()
            };
            JoinMembers.push(member);
            clearForm();
            refreshList();
        }
    }

    function clearForm() {
        $('.searchName, .age, .year, .month, .day, .address').val('');
        $('.light1, .light2, .light3').prop('checked', false);
    }

    function refreshList() {
        const $tbody = $('.ListTbody').empty();
        JoinMembers.forEach((member, index) => {
            const $tr = $(`<tr class="${index % 2 === 0 ? 'table-warning' : 'table-info'}">
                <td>${member.name}</td>
                <td>${member.light1 ? '✔' : ''}</td>
                <td>${member.light2 ? '✔' : ''}</td>
                <td>${member.light3 ? '✔' : ''}</td>
                <td>${member.age}</td>
                <td>${member.birthDate}</td>
                <td>${member.address}</td>
                <td><button onclick="removeJoin(${index})">X</button></td>
            </tr>`).appendTo($tbody);
        });
    }

    function removeJoin(index) {
        JoinMembers.splice(index, 1);
        refreshList();
    }

    function showLoading(show) {
        const gifIndex = Math.floor(Math.random() * LoadingGif.length);
        $('#Gif').attr('src', LoadingGif[gifIndex]);
        $('#loading').toggle(show);
    }

    function MakeExcel() {
        if (JoinMembers.length < 1) {
            alert("請加入參加人員");
            return;
        }
        const membersData = JoinMembers.map(member => Object.values(member).join(',')).join('|');
        showLoading(true);
        $.ajax({
            type: "POST",
            dataType: 'text',
            url: GAS_API,
            data: { mission: 'MakingMembersExcel', members: membersData },
            success: function (result) {
                $('.PrintLink').html(`<a href="${result}">查看結果</a>`);
                alert("製作完成！");
            },
            complete: () => showLoading(false)
        });
    }

    function copyInput(copyString) {
        const textarea = document.createElement('textarea');
        textarea.value = copyString;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
    }
</script>

</body>

</html>
