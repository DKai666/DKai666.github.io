<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明聖宮-點燈名單</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
        integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
        crossorigin="anonymous"></script>
    <style>
        .name li {
            list-style-type: none;
            margin-top: 5px;
        }

        input {
            width: 25%;
        }

        .address {
            width: 75%;
        }

        .year,
        .month,
        .day {
            width: 50px;
        }

        div.loadingdiv {
            height: 100%;
            width: 100%;
            /*100%覆蓋網頁內容, 避免user在loading時進行其他操作*/
            position: fixed;
            z-index: 99999;
            /*須大於網頁內容*/
            top: 0;
            left: 0;
            display: block;
            background: rgb(207, 207, 207);
            opacity: 1.0;
            text-align: center;
        }

        div.loadingdiv img {
            position: relative;
            vertical-align: middle;
            text-align: center;
            margin: 0 auto;
            margin-top: 25vh;
            width: 100%;
        }
    </style>
</head>

<body>
    <input type="search" class="searchName" placeholder="請輸入姓名" value="">
    <input class="age" placeholder="年齡" value="">
    <input type="number" class="year" placeholder="民國年" value="">年
    <input type="number" class="month" placeholder="月" value="">月
    <input type="number" class="day" placeholder="日" value="">日
    <br>
    <input class="address" placeholder="地址" value="">
    <button onclick="addToJoin()">加入</button>
    <ul class="name"></ul>
    <table class="table">
        <thead>
            <tr class="table-primary">
                <td><button onclick="MakeExcel()">製作檔案</button></td>
                <td colspan="3" class="PrintLink"></td>
            </tr>
            <tr class="table-danger">
                <td><strong>姓名</strong></td>
                <td><strong>年齡</strong></td>
                <td><strong>生日</strong></td>
                <td><strong>地址</strong></td>
            </tr>
        </thead>
        <tbody class="ListTbody"></tbody>
    </table>

    <div class="loadingdiv" id="loading" style="display: none">
        <img src="loading.gif" />
    </div>

    <script>
        var GAS_API = "https://script.google.com/macros/s/AKfycbyqVQJrby2Jrds573K9uLdbuut2FHTNMnQkN55DJBCozEjZnejZ-YfPParO1VysFClHRg/exec";
        var MembersInfo = [];
        var AllMembers = [];
        var JoinMembers = [];
        window.onload = function () {
            $(".year").on("keypress keyup change", function (event) {
                if ($(this).val() < 1) { $(this).val(""); }
            });
            $(".month").on("keypress keyup change", function (event) {
                if ($(this).val() < 1 || $(this).val() > 12) { $(this).val(""); }
            });
            $(".day").on("keypress keyup change", function (event) {
                if ($(this).val() < 1 || $(this).val() > 31) { $(this).val(""); }
            });
            $.ajax({
                beforeSend: function () {
                    //將div顯示
                    $('#loading').css("display", "");
                },
                type: "POST",
                dataType: 'text',
                url: GAS_API,
                data: {
                    mission: 'GetAllMembers',
                    members: ""
                },
                success: function (result) {
                    result = result.split(',');
                    for (i = 0; i < result.length / 4; i++) {
                        item = [];
                        for (j = 0; j < 4; j++) {
                            item.push(result[(4 * i) + j]);
                        }
                        MembersInfo.push(item);
                        AllMembers.push(result[4 * i]);
                    }
                    MembersInfo.forEach(function (e, index) {
                        $(".name").append(`<li id=li${index}>${e}</li>`);
                        $(`#li${index}`).css("display", "none");
                        $(`#li${index}`).on('click', function () { PickOne(e); });
                    })
                },
                complete: function () {
                    //再次隱藏//可利用setTimeout 讓loading效果明顯
                    $('#loading').css("display", "none");
                    // setTimeout(function () { $('#loading').css("display", "none"); }, 3000);
                }
            });
            document.querySelector('.searchName').addEventListener('input', function (e) {
                tempWord = e.target.value;
                try {
                    AllMembers.forEach(function (e, index) {
                        if (e.includes(tempWord)) { $(`#li${index}`).css("display", ""); }
                        else { $(`#li${index}`).css("display", "none"); }
                    })
                } catch { }
                if (tempWord == "") { $(`.name li`).css("display", "none"); }
            })
        }

        function PickOne(e) {
            $('.searchName').val(e[0]);
            if (e[1] != "") { $('.age').val(e[1]); }
            if (e[2] != "") {
                const [year, month, day] = e[2].split('/');
                $('.year').val(parseInt(year));
                $('.month').val(parseInt(month));
                $('.day').val(parseInt(day));
            }
            $('.address').val(e[3]);
            $(`.name li`).css("display", "none");
        }

        function addToJoin() {
            if ($('.searchName').val() != "") {
                let temp = [];
                let Tempstr = "";
                $(`.name li`).css("display", "none");
                temp.push($('.searchName').val());
                temp.push($('.age').val());
                if ($('.year').val() != "" && $('.month').val() != "" && $('.day').val() != "") {
                    let year = parseInt($('.year').val());
                    let month = parseInt($('.month').val());
                    let day = parseInt($('.day').val());
                    temp.push(`${year}/${month}/${day}`);
                } else { temp.push(""); }
                temp.push($('.address').val());
                Tempstr = temp.toString().replace(/,/g, '-');
                JoinMembers.push(Tempstr);
                $('.searchName').val("");
                $('.age').val("");
                $('.year').val("");
                $('.month').val("");
                $('.day').val("");
                $('.address').val("");
                FreshList();
            }
        }

        function RemoveJoin() {
            JoinMembers.forEach(function (e, index) {
                if (event.target.id == e.split('-')[0]) {
                    JoinMembers.splice(index, 1);
                }
            })
            FreshList();
        }

        function FreshList() {
            let tableDom = '';
            for (i = 0; i < JoinMembers.length; i++) {
                name = JoinMembers[i].split('-')[0];
                if (i % 2 === 0) {
                    tableDom = tableDom + `<tr class="table-warning">`;
                }
                else { tableDom = tableDom + `<tr class="table-info">`; }
                tableDom = tableDom + `<td>${JoinMembers[i].split('-')[0]}</td>`;
                tableDom = tableDom + `<td>${JoinMembers[i].split('-')[1]}</td>`;
                tableDom = tableDom + `<td>${JoinMembers[i].split('-')[2]}</td>`;
                tableDom = tableDom + `<td>${JoinMembers[i].split('-')[3]}</td>`;
                tableDom = tableDom + `<td><button id=${name}>X</button></td>`;
                tableDom = tableDom + "</tr>";
            }
            $('.ListTbody').html(tableDom);
            for (i = 0; i < JoinMembers.length; i++) {
                name = JoinMembers[i].split('-')[0];
                $(`#${name}`).on('click', function () { RemoveJoin() });
            }
        }

        function MakeExcel() {
            if (JoinMembers.length < 1) { alert("請加入參加人員"); return; }
            var member = "";
            var tempresult = [];
            JoinMembers.forEach(function (e, index) {
                tempresult.push(e);
            })
            member = tempresult.toString();
            member = member.replace(/,/g, '|');
            member = member.replace(/-/g, ',');
            $.ajax({
                beforeSend: function () {
                    //將div顯示
                    $('#loading').css("display", "");
                },
                type: "POST",
                dataType: 'text',
                url: GAS_API,
                data: {
                    mission: 'LightingUpdateMembers',
                    members: member
                },
                success: function (result) {
                    console.log(result);
                }
            });
            $.ajax({
                type: "POST",
                dataType: 'text',
                url: GAS_API,
                data: {
                    mission: 'LightingMakeExcel',
                    members: member
                },
                success: function (result) {
                    GetShortUrl(result);
                },
                complete: function () {
                    //再次隱藏//可利用setTimeout 讓loading效果明顯
                    // $('#loading').css("display", "none");
                    setTimeout(function () { $('#loading').css("display", "none"); }, 2000);
                    alert("製作完成！");
                }
            });
        }

        function GetShortUrl(ExcelID) {
            let url = "https://api.reurl.cc/shorten";
            let xhr = new XMLHttpRequest();
            xhr.open("POST", url);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.setRequestHeader("reurl-api-key", "4070ff49d794e13719503b663c974755ecd0b034999a04df8a38b58d65165567c4f5d6");
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    $('.PrintLink').html(`<a href="${JSON.parse(xhr.responseText).short_url}">${JSON.parse(xhr.responseText).short_url}</a>`);
                    copyInput(`${JSON.parse(xhr.responseText).short_url}`);
                }
            };
            var data = `{ "url" : "https://docs.google.com/spreadsheets/d/${ExcelID}"}`;
            xhr.send(data);
        }

        function copyInput(copyString) {
            let txa = document.createElement('textarea');
            txa.value = copyString;
            document.body.appendChild(txa);
            txa.select();
            var res = document.execCommand('copy');
            document.execCommand('copy');
            document.execCommand('copy');
            document.execCommand('copy');
            document.body.removeChild(txa);
        }
    </script>
</body>

</html>
