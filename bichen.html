        <script>
                window.onload = function () {
                        var today = new Date();
                        var todayDate = new Date(`${today.getMonth() + 1}/${today.getDate()}/${today.getFullYear()}`);
                        var startDate = new Date("11/14/2021");
                        var Howlong = Math.abs(todayDate - startDate);
                        document.querySelector(".date").innerHTML = `Love you ${Howlong / (1000 * 3600 * 24) + 1}th Day`
                }
                $('.Clean').click(function (e) {
                        var CleanName = document.getElementsByName(event.target.name);
                        for (i = 0; i < CleanName.length - 1; i++) {
                                CleanName[i].checked = false;
                        }
                });
                function CreatList() {
                        let LatePeople = new Array();
                        let NoMeetPeople = new Array();
                        document.querySelectorAll(".on").forEach(function (e) {
                                if (document.getElementsByName(e.name)[2].checked) { LatePeople.push(e.name) };
                                if (document.getElementsByName(e.name)[3].checked) { NoMeetPeople.push(e.name) };
                        })
                        $('.LateArea').html('<div class="LateList"></div><button class="enterLate" onclick="enterLatePeople();">紀錄遲到資料</button>');
                        let List = '<h4>遲到</h4>';
                        //LatePeople.forEach(function (name) {
                        List = List + `<p class="lateP" style="display:inline-block">${LatePeople.toString()}</p><br>`
                        //List = List + `<p class="lateP" style="display:inline-block">${name}</p><input class="lateR" type="text" value=""><br>`/})
                        List = List + '<h4>到了未參加工具箱</h4>';
                        NoMeetPeople.forEach(function (name) {
                                if (name == "張家彬" || name == "陳政宏") {
                                        List = List + `<p class="nomeetP" style="display:inline-block">${name}</p><input class="nomeetR" type="text" value="開貨車"><br>`
                                } else {
                                        List = List + `<p class="nomeetP" style="display:inline-block">${name}</p><input class="nomeetR" type="text" value=""><br>`
                                }
                        })
                        $('.LateList').html(List);
                }
                function copy() {
                        let allInput = document.querySelectorAll(".on");
                        let OnPeople = new Array();
                        // let NightPeople = new Array();
                        let OffPeople = new Array();
                        let LatePeople = new Array();
                        let NoMeetPeople = new Array();
                        allInput.forEach(function (e) {
                                if (document.getElementsByName(e.name)[0].checked) { OnPeople.push(e.name) };
                                // if (document.getElementsByName(e.name)[1].checked) { NightPeople.push(e.name) };
                                if (document.getElementsByName(e.name)[1].checked) { OffPeople.push(e.name) };
                        })
                        document.querySelectorAll('.lateP').forEach(function (item) {
                                LatePeople.push(item.innerHTML);
                        })
                        document.querySelectorAll('.nomeetP').forEach(function (item, i) {
                                if (document.querySelectorAll('.nomeetR')[i].value != "") {
                                        NoMeetPeople.push(`${item.innerHTML}(${document.querySelectorAll('.nomeetR')[i].value})`);
                                } else {
                                        NoMeetPeople.push(item.innerHTML);
                                }
                        })
                        let copyString = `${new Date().getMonth() + 1}/${new Date().getDate()}(8:15)`;
                        if (LatePeople.length > 0) { copyString += `\n\n遲到：${LatePeople.toString()}`; }
                        if (NoMeetPeople.length > 0) { copyString += `\n\n到了未參加工具箱會議：${NoMeetPeople.toString()}`; }
                        if (LatePeople.length == 0 && NoMeetPeople.length == 0) { copyString += `\n\n工具箱會議遲到及未參加人員：無`; }
                        copyString += `\n\n出勤人員：${OnPeople.toString()}\n\n休假人員：${OffPeople.toString()}`
                        // if (LatePeople.length == 0 && NoMeetPeople.length == 0) { copyString += `\n\n工具箱會議遲到及未參加人員：無`; }
                        // copyString += `\n\n出勤人員：${OnPeople.toString()}\n\n夜班人員：${NightPeople.toString()}\n\n休假人員：${OffPeople.toString()}`
                        copyInput(copyString);
                }
                function copyInput(copyString) {
                        let txa = document.createElement('textarea');
                        txa.value = copyString;
                        document.body.appendChild(txa);
                        txa.select();
                        var res = document.execCommand('copy');
                        document.execCommand('copy');
                        document.execCommand('copy');
                        document.execCommand('copy');
                        document.body.removeChild(txa);
                }
                function enterLatePeople() {
                        let allInput = document.querySelectorAll(".on");
                        let OOnList = new Array();
                        let OOffList = new Array();
                        let LLateList = new Array();
                        let NNoMeetList = new Array();
                        let NNoMeetReason = new Array();
                        allInput.forEach(function (e) {
                                if (document.getElementsByName(e.name)[0].checked) { OOnList.push(e.name) };
                                if (document.getElementsByName(e.name)[1].checked) { OOffList.push(e.name) };
                        })
                        document.querySelectorAll('.lateP').forEach(function (item) {
                                LLateList.push(item.innerHTML);
                        })
                        document.querySelectorAll('.nomeetP').forEach(function (item) {
                                NNoMeetList.push(item.innerHTML);
                        })
                        document.querySelectorAll('.nomeetR').forEach(function (item) {
                                NNoMeetReason.push(item.value);
                        })
                        $.ajax({
                                url: "https://script.google.com/macros/s/AKfycby2mapglQ2M9cvFiEvUiLxKdbJBXKbupOsS26YDrz69eSNkVzWGDa8lVhzeAolT8mO2/exec",
                                data: {
                                        date: `${new Date().getMonth() + 1}/${new Date().getDate()}`,
                                        OnList: OOnList.toString(),
                                        OffLis: OOffList.toString(),
                                        LateList: LLateList.toString(),
                                        NoMeetList: NNoMeetList.toString(),
                                        NoMeetReason: NNoMeetReason.toString()
                                },
                                type: "POST",
                                dataType: 'text'
                        });
                }
